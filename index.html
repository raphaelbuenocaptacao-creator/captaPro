<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#050505,#160000 55%,#050505);color:#fff}button,input,select,textarea{font-family:inherit}.wrap{max-width:980px;margin:0 auto;padding:14px}.top{text-align:center;padding:8px 0 12px}.logo{font-size:42px;font-weight:900;letter-spacing:-1px}.logo span{color:#ff2633}.version{display:inline-block;margin-top:5px;border:1px solid #852020;border-radius:999px;background:#160505;color:#ffb0b0;font-size:12px;font-weight:900;padding:6px 16px}.brand{color:#00e676;font-size:12px;font-weight:900;margin-top:8px}.card{background:#101010;border:1px solid #2b2b2b;border-radius:20px;padding:16px;margin:12px 0;box-shadow:0 0 18px rgba(255,38,51,.10)}h2{margin:0 0 12px;border-left:4px solid #ff2633;padding-left:10px;font-size:26px}h3{margin:0 0 10px;font-size:20px}.hint{color:#aaa;font-size:13px;line-height:1.45}.mini{color:#aaa;font-size:12px}.tabs{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:12px 0 18px}.tabs button{background:#181818;color:#fff;border:0;border-radius:15px;padding:18px 10px;min-height:70px;font-weight:900;font-size:16px;cursor:pointer}.tabs button.active{background:linear-gradient(135deg,#ef1b24,#ff3333);box-shadow:0 0 0 2px #fff inset}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}input,select,textarea{width:100%;padding:13px;border-radius:13px;border:1px solid #333;background:#050505;color:#fff;font-size:15px}textarea{min-height:90px;resize:vertical}button.main{background:linear-gradient(135deg,#ef1b24,#ff3333);border:0;color:#fff;padding:14px;border-radius:13px;font-weight:900;cursor:pointer}button.secondary{background:#202020;border:1px solid #444;color:#fff;padding:14px;border-radius:13px;font-weight:900;cursor:pointer}button.green{background:linear-gradient(135deg,#008c47,#00e676);color:#061006;border:0}.hidden{display:none!important}.ok{color:#00e676;font-weight:900}.danger{color:#ff8585;font-weight:900}.warn{color:#ffd54f;font-weight:900}.kpi{background:linear-gradient(145deg,#171717,#0b0b0b);border:1px solid #303030;border-radius:18px;padding:14px;text-align:center;min-height:95px}.kpi span{display:block;color:#aaa;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.3px}.kpi b{display:block;color:#ff3333;font-size:31px;margin-top:7px;line-height:1.05}.kpi.green b{color:#00e676}.kpi.blue b{color:#00c2ff}.kpi.yellow b{color:#ffd54f}.section{background:#0b0b0b;border:1px solid #2d2d2d;border-radius:20px;padding:14px;margin:12px 0}.bar{height:18px;background:#252525;border:1px solid #333;border-radius:999px;overflow:hidden}.fill{height:100%;border-radius:999px;background:linear-gradient(135deg,#00a651,#00e676);width:0%;transition:.25s}.tableWrap{overflow:auto}.table{width:100%;border-collapse:collapse;font-size:13px;min-width:720px}.table th{color:#ff8585;text-transform:uppercase;font-size:11px}.table td,.table th{border-bottom:1px solid #252525;padding:10px;text-align:left}.table .pos{color:#ffd54f;font-weight:900}.money{color:#00e676;font-weight:900}.rankHead{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}.rankHead div{background:#151515;border:1px solid #333;border-radius:18px;padding:15px;text-align:center}.rankHead span{font-size:12px;color:#aaa;font-weight:900;text-transform:uppercase}.rankHead b{display:block;color:#00e676;font-size:28px;margin-top:6px}.fichaItem{background:linear-gradient(145deg,#111,#080808);border:1px solid #303030;border-radius:16px;padding:12px;margin:8px 0}.fichaItem.sala{border-color:rgba(0,230,118,.55);background:linear-gradient(145deg,#061d10,#080808)}.fichaTop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap}.tag{display:inline-block;margin:6px 6px 0 0;padding:6px 9px;border-radius:999px;background:#181818;border:1px solid #333;font-size:11px;font-weight:900;color:#ccc}.tag.q{border-color:#00e676;color:#00e676}.tag.nq{border-color:#ff5252;color:#ff8585}.tag.sala{border-color:#00c2ff;color:#00c2ff}.empty{text-align:center;color:#777;padding:18px;border:1px dashed #333;border-radius:16px;background:#090909}.modal{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;padding:16px}.modalBox{max-width:820px;width:100%;max-height:88vh;overflow:auto;background:#101010;border:1px solid #5a1717;border-radius:22px;padding:16px;box-shadow:0 0 30px rgba(255,38,51,.28)}.campo{background:#080808;border:1px solid #2d2d2d;border-radius:12px;padding:10px}.campo small{display:block;color:#ff8585;font-size:10px;text-transform:uppercase;font-weight:900;margin-bottom:4px}.campo b{font-size:14px;word-break:break-word}.ceoMenu{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.ceoMenu button{background:#202020;border:1px solid #444;color:#fff;border-radius:13px;padding:13px;font-weight:900}.ceoMenu button.active{background:linear-gradient(135deg,#ef1b24,#ff3333);border:0}.ceoBlock{display:none}.ceoBlock.active{display:block}.mapGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.pontoCard{background:#080808;border:1px solid #333;border-radius:16px;padding:12px}.pontoCard h4{margin:0 0 8px;color:#ff8585}.profDot{display:inline-block;margin:5px 5px 0 0;padding:7px 9px;border-radius:999px;background:#151515;border:1px solid #00e676;color:#00e676;font-size:12px;font-weight:900}.loginBox{max-width:850px;margin:0 auto}.adminOnly{display:none}body.ceo .adminOnly{display:block}@media(max-width:760px){.wrap{padding:10px}.logo{font-size:34px}.tabs{grid-template-columns:1fr 1fr}.tabs button{min-height:60px}.grid,.grid3,.grid4,.rankHead,.mapGrid,.ceoMenu{grid-template-columns:1fr}.kpi b{font-size:26px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div class="logo">Capta<span>Pro</span></div><div class="version">Versão 5.3 LIMPO</div><div class="brand">Bueno Invest</div><button id="btnSair" class="secondary hidden" style="max-width:170px;margin-top:10px" onclick="sair()">Sair</button></div>

  <section id="loginBox" class="card loginBox">
    <h2>Entrada</h2>
    <div class="grid"><input id="email" type="email" placeholder="Seu e-mail"><input id="nome" placeholder="Seu nome completo"></div>
    <button class="main" style="margin-top:10px;width:100%" onclick="entrar()">Entrar</button>
    <p id="loginMsg" class="mini"></p>
  </section>

  <section id="app" class="hidden">
    <div class="tabs">
      <button class="active" data-tab="pesquisa" onclick="showTab('pesquisa',this)">Pesquisa</button>
      <button data-tab="profissional" onclick="showTab('profissional',this)">Meu<br>Profissional</button>
      <button data-tab="relatorio" onclick="showTab('relatorio',this)">Relatório</button>
      <button data-tab="ranking" onclick="showTab('ranking',this)">Ranking<br>Julho</button>
      <button data-tab="arena" onclick="showTab('arena',this)">Arena SX</button>
      <button data-tab="ceo" class="adminOnly" onclick="showTab('ceo',this)">Portal CEO</button>
    </div>

    <section id="pesquisa" class="tabContent card"></section>
    <section id="profissional" class="tabContent card hidden"></section>
    <section id="relatorio" class="tabContent card hidden"></section>
    <section id="ranking" class="tabContent card hidden"></section>
    <section id="arena" class="tabContent card hidden"></section>
    <section id="ceo" class="tabContent card hidden adminOnly"></section>
  </section>
</div>

<div id="modalFicha" class="modal hidden"><div class="modalBox"><div id="modalFichaConteudo"></div><button class="main" style="width:100%;margin-top:10px" onclick="fecharFicha()">Fechar</button></div></div>

<script>
const CEOS=['raphaelbueno.captacao@gmail.com','raphaelbueno@hotmail.com','emaildogestor@gmail.com'];
const RANKING_JULHO=[
 {nome:'Pedro Henrique',casais:13,vendas:6,vgv:512400,ponto:'Porta dentro do Park'},
 {nome:'José Ademir',casais:12,vendas:2,vgv:185880,ponto:'Djalma'},
 {nome:'Paulo Victor',casais:10,vendas:3,vgv:270500,ponto:'Baden Baden'},
 {nome:'Adriano Moreira',casais:8,vendas:0,vgv:0,ponto:'Porta dentro do Park'},
 {nome:'Jéssica Barbosa',casais:7,vendas:0,vgv:0,ponto:'Park Dream House'},
 {nome:'Mateus Santos',casais:6,vendas:2,vgv:180000,ponto:'Porta dentro do Park'},
 {nome:'Ivanilson',casais:6,vendas:1,vgv:70000,ponto:'Guarda-chuvas'},
 {nome:'Matheus Domingos',casais:4,vendas:0,vgv:0,ponto:'Corredor'},
 {nome:'João Vitor',casais:3,vendas:0,vgv:0,ponto:'Igreja'},
 {nome:'Josyene Freitas',casais:3,vendas:0,vgv:0,ponto:'Park Dream House'},
 {nome:'Márcio Alfaia',casais:3,vendas:0,vgv:0,ponto:'Fábrica Spinassi'},
 {nome:'Renan Marcondes',casais:3,vendas:0,vgv:0,ponto:'Baden Baden'},
 {nome:'Ana Caroline',casais:2,vendas:4,vgv:380000,ponto:'Renner'},
 {nome:'André Carriço',casais:2,vendas:0,vgv:0,ponto:'Corredor'},
 {nome:'Felipe Ribeiro',casais:1,vendas:0,vgv:0,ponto:'Djalma'},
 {nome:'Jonatas França',casais:1,vendas:0,vgv:0,ponto:'Baden Baden'},
 {nome:'Manara Alexandre',casais:1,vendas:0,vgv:0,ponto:'Guarda-chuvas'},
 {nome:'Matheus Esley',casais:1,vendas:0,vgv:0,ponto:'Fábrica Spinassi'},
 {nome:'Otávio José',casais:1,vendas:0,vgv:0,ponto:'Guarda-chuvas'},
 {nome:'Ricardo Maltchik',casais:1,vendas:0,vgv:0,ponto:'Renner'}
];
const PONTOS=['Porta dentro do Park','Park Dream House','Fábrica Spinassi','Corredor','Baden Baden','Djalma','Igreja','Renner','Guarda-chuvas','Posto Shell'];
let usuario={email:'',nome:'',ceo:false};
const $=id=>document.getElementById(id); const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const norm=s=>String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function pct(a,b){return b?((a/b)*100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+'%':'0,00%'}
function today(){const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10)}
function parseMoney(v){return Number(String(v||'').replace(/\D/g,''))||0}
function getFichas(){try{return JSON.parse(localStorage.getItem('captapro_fichas_53')||'[]')}catch(e){return []}}
function setFichas(a){localStorage.setItem('captapro_fichas_53',JSON.stringify(a))}
function getAbord(){try{return JSON.parse(localStorage.getItem('captapro_abord_53')||'[]')}catch(e){return []}}
function setAbord(a){localStorage.setItem('captapro_abord_53',JSON.stringify(a))}
function getDesafios(){try{return JSON.parse(localStorage.getItem('captapro_desafios_53')||'[]')}catch(e){return []}}
function setDesafios(a){localStorage.setItem('captapro_desafios_53',JSON.stringify(a))}
function isCEO(){return usuario.ceo||document.body.classList.contains('ceo')}
function entrar(){const email=$('email').value.trim().toLowerCase(), nome=$('nome').value.trim()||email;if(!email){$('loginMsg').innerHTML='<span class="danger">Informe o e-mail.</span>';return}usuario={email,nome,ceo:CEOS.includes(email)||norm(nome).includes('raphael')};localStorage.setItem('captapro_login_53',JSON.stringify(usuario));document.body.classList.toggle('ceo',usuario.ceo);$('loginBox').classList.add('hidden');$('app').classList.remove('hidden');$('btnSair').classList.remove('hidden');renderAll();showTab('pesquisa',document.querySelector('[data-tab="pesquisa"]'))}
function sair(){localStorage.removeItem('captapro_login_53');location.reload()}
(function(){try{const u=JSON.parse(localStorage.getItem('captapro_login_53')||'null');if(u){usuario=u;$('email').value=u.email||'';$('nome').value=u.nome||'';setTimeout(entrar,150)}}catch(e){}})();
function showTab(id,btn){document.querySelectorAll('.tabContent').forEach(x=>x.classList.add('hidden'));$(id)?.classList.remove('hidden');document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));btn?.classList.add('active');renderTab(id);window.scrollTo({top:0,behavior:'smooth'})}
function renderAll(){['pesquisa','profissional','relatorio','ranking','arena','ceo'].forEach(renderTab)}
function renderTab(id){if(id==='pesquisa')renderPesquisa();if(id==='profissional')renderProfissional();if(id==='relatorio')renderRelatorio();if(id==='ranking')renderRanking();if(id==='arena')renderArena();if(id==='ceo')renderCEO()}
function opt(arr){return arr.map(x=>`<option>${esc(x)}</option>`).join('')}
function renderPesquisa(){const box=$('pesquisa');box.innerHTML=`<h2>Pesquisa</h2><p class="hint">Ficha limpa: salvar, consultar depois e marcar casal em sala.</p><div class="section"><button class="main" style="width:100%;min-height:58px;font-size:18px" onclick="registrarAbordagem()">+ Registrar abordagem</button><p class="mini">Abordagens de hoje: <b class="ok" id="abHoje">${abordHoje().length}</b></p></div><div class="grid"><select id="equipe"><option value="">1. Equipe</option><option>PARK</option><option>EXTERNA</option></select><select id="ponto"><option value="">2. Ponto de captação</option>${opt(PONTOS)}</select></div><div class="section"><h3>3. Pessoa 1</h3><div class="grid3"><input id="nome1" placeholder="Nome"><input id="idade1" inputmode="numeric" placeholder="Idade"><input id="profissao1" placeholder="Profissão"></div></div><div class="section"><h3>4. Pessoa 2</h3><div class="grid3"><input id="nome2" placeholder="Nome"><input id="idade2" inputmode="numeric" placeholder="Idade"><input id="profissao2" placeholder="Profissão"></div></div><div class="grid"><select id="estado"><option value="">Estado</option><option>SP</option><option>RJ</option><option>MG</option><option>PR</option><option>SC</option><option>RS</option><option>GO</option><option>DF</option><option>BA</option><option>ES</option></select><input id="cidade" placeholder="Cidade"><select id="relacionamento"><option value="">Relacionamento</option><option>Casados</option><option>União estável</option><option>Namorados</option><option>Noivos</option><option>Solteiro</option></select><select id="tempo"><option value="">Tempo juntos</option><option>Menos de 1 ano</option><option>1 ano</option><option>2 anos</option><option>3 anos</option><option>4 anos</option><option>5 anos</option><option>Mais de 5 anos</option><option>Mais de 10 anos</option></select><input id="carro" placeholder="Carro. Ex: Onix"><input id="ano" inputmode="numeric" placeholder="Ano do carro. Ex: 2015"><select id="casa"><option value="">Casa própria?</option><option>Sim</option><option>Não</option></select><select id="cartao"><option value="">Cartão de crédito?</option><option>Sim</option><option>Não</option></select><input id="renda" inputmode="numeric" placeholder="Renda bruta do casal. Ex: 15000"><select id="multi"><option value="">Já conheceu multipropriedade?</option><option>Sim</option><option>Não</option></select><select id="brinde"><option value="">Selecione a cortesia</option><option>2 Museu de Cera</option><option>2 Mini Mundo</option><option>2 Vale dos Dinossauros</option><option>2 Terror</option><option>4 Espelho do Jordão</option><option>Rostie - R$ 120 consumo</option><option>Vemaguet - R$ 120 consumo</option><option>Armazém Brasil - R$ 120 consumo</option><option>Combustível - R$ 120 consumo</option><option>Chocolate Spinassi - R$ 120 consumo</option><option>Loja Parque R$ 150</option></select><input id="contato" placeholder="WhatsApp / contato"></div><textarea id="obs" style="margin-top:9px" placeholder="Observações"></textarea><div class="grid" style="margin-top:10px"><button class="main" onclick="salvarFicha(false)">Salvar ficha</button><button class="main green" onclick="salvarFicha(true)">Salvar + Casal em Sala</button></div><p id="formMsg" class="mini"></p><div id="fichaSalvaBox"></div>`}
function registrarAbordagem(){const a=getAbord();a.push({id:Date.now(),email:usuario.email,nome:usuario.nome,data:today(),created_at:new Date().toISOString()});setAbord(a);$('abHoje')&&($('abHoje').textContent=abordHoje().length);renderProfissional();$('formMsg').innerHTML='<span class="ok">Abordagem registrada.</span>'}
function abordHoje(){return getAbord().filter(x=>x.email===usuario.email&&x.data===today())}
function qualificar(f){let erros=[];const renda=parseMoney(f.renda);const idade=Math.max(Number(f.idade1)||0,Number(f.idade2)||0);if(!f.nome1||!f.nome2)erros.push('nomes');if(idade<25||idade>64)erros.push('idade');if(renda<15000)erros.push('renda');if(f.casa!=='Sim')erros.push('casa');if(f.cartao!=='Sim')erros.push('cartão');if(!f.profissao1&&!f.profissao2)erros.push('profissão');return {status:erros.length===0?'Q':erros.length===1?'NQ 1 Item':'NQ',motivo:erros.length?erros.join(', '):'Dentro do perfil'}}
function salvarFicha(sala){const f={id:Date.now(),email:usuario.email,captador:usuario.nome,equipe:$('equipe').value,ponto:$('ponto').value,nome1:$('nome1').value,idade1:$('idade1').value,profissao1:$('profissao1').value,nome2:$('nome2').value,idade2:$('idade2').value,profissao2:$('profissao2').value,estado:$('estado').value,cidade:$('cidade').value,relacionamento:$('relacionamento').value,tempo:$('tempo').value,carro:$('carro').value,ano:$('ano').value,casa:$('casa').value,cartao:$('cartao').value,renda:$('renda').value,multi:$('multi').value,brinde:$('brinde').value,contato:$('contato').value,obs:$('obs').value,sala:!!sala,data:today(),created_at:new Date().toISOString()};const q=qualificar(f);f.status=q.status;f.motivo=q.motivo;const arr=getFichas();arr.unshift(f);setFichas(arr);$('formMsg').innerHTML=`<span class="ok">Ficha salva.</span> <span class="tag ${q.status==='Q'?'q':'nq'}">${q.status}</span> ${sala?'<span class="tag sala">Sala</span>':''}`;$('fichaSalvaBox').innerHTML=`<div class="section"><h3>Ficha salva</h3>${fichaResumo(f,0,false)}<div class="grid"><button class="secondary" onclick="verFicha(${f.id})">Ver ficha completa</button><button class="main" onclick="renderPesquisa()">Nova pesquisa</button></div></div>`;renderAll()}
function meusDados(){const f=getFichas().filter(x=>x.email===usuario.email||norm(x.captador)===norm(usuario.nome));const a=getAbord().filter(x=>x.email===usuario.email);return {f,a}}
function stats(f,a){const hoje=f.filter(x=>x.data===today());return {abord:a.filter(x=>x.data===today()).length,pesq:hoje.length,q:hoje.filter(x=>x.status==='Q').length,nq:hoje.filter(x=>String(x.status).startsWith('NQ')&&!String(x.status).includes('1')).length,nq1:hoje.filter(x=>String(x.status).includes('1')).length,sala:hoje.filter(x=>x.sala).length}}
function card(t,v,c=''){return `<div class="kpi ${c}"><span>${t}</span><b>${v}</b></div>`}
function rowRank(nome=usuario.nome){return RANKING_JULHO.find(r=>norm(r.nome)===norm(nome))}
function renderProfissional(){const box=$('profissional');if(!box)return;const {f,a}=meusDados();const s=stats(f,a);const r=rowRank();const casais=r?r.casais:f.filter(x=>x.sala).length;const meta=35;const perc=Math.min(100,Math.round((casais/meta)*100));const faltam=Math.max(0,meta-casais);box.innerHTML=`<h2>Meu Profissional</h2><div class="grid"><div class="section"><h3>${esc(usuario.nome)}</h3><p class="hint">Área limpa para acompanhar resultado e encontrar fichas depois de feitas.</p></div><div class="section"><h3 class="ok">${casais} casais em sala</h3><p class="hint">Meta mensal: ${meta}. Faltam ${faltam} casais • ${perc}%</p><div class="bar"><div class="fill" style="width:${perc}%"></div></div></div></div><div class="section"><h3>Resultado de Hoje</h3><div class="grid4">${card('Abordagens',s.abord,'blue')}${card('Pesquisas',s.pesq)}${card('Q',s.q,'green')}${card('NQ',s.nq,'yellow')}${card('1 Item',s.nq1,'yellow')}${card('Sala',s.sala,'green')}${card('Conv. sala',pct(s.sala,s.pesq),'blue')}${card('Eficiência Q',pct(s.q,s.pesq),'blue')}</div></div><div class="section"><h3>Resultado Julho</h3><div class="grid4">${card('Casais',r?r.casais:casais,'green')}${card('Vendas',r?r.vendas:0,'green')}${card('VGV',r?money(r.vgv):money(0),'green')}${card('Eficiência',r?pct(r.vendas,r.casais):'0,00%','blue')}</div></div><div class="section"><div class="fichaTop"><h3>Minhas fichas guardadas</h3><span class="tag q">${f.length} fichas salvas</span></div><div class="grid"><input id="buscaProf" placeholder="Buscar por nome, cidade, telefone ou cortesia" oninput="filtrarProf()"><select id="filtroProf" onchange="filtrarProf()"><option value="todas">Todas</option><option value="hoje">Hoje</option><option value="sala">Sala</option><option value="q">Q</option><option value="nq">NQ</option></select></div><div id="listaProf"></div></div>`;filtrarProf()}
function fichaResumo(f,i,acoes=true){return `<div class="fichaItem ${f.sala?'sala':''}"><div class="fichaTop"><div><b>${esc(f.nome1||'Pessoa 1')} + ${esc(f.nome2||'Pessoa 2')}</b><small>${esc(f.cidade||'-')} • ${esc(f.contato||'sem contato')} • ${new Date(f.created_at).toLocaleString('pt-BR')}</small></div><div><span class="tag ${f.status==='Q'?'q':'nq'}">${esc(f.status)}</span>${f.sala?'<span class="tag sala">Sala</span>':''}</div></div><span class="tag">${esc(f.captador)}</span><span class="tag">${esc(f.ponto||'sem ponto')}</span><span class="tag">${esc(f.brinde||'sem cortesia')}</span>${acoes?`<div class="grid" style="margin-top:8px"><button class="secondary" onclick="verFicha(${f.id})">Ver ficha completa</button><button class="secondary" onclick="toggleSala(${f.id})">${f.sala?'Remover sala':'Marcar sala'}</button></div>`:''}</div>`}
function filtrarLista(fichas,buscaId,filtroId,boxId){const busca=norm($(buscaId)?.value||''), filtro=$(filtroId)?.value||'todas';let out=fichas.filter(f=>!busca||norm(JSON.stringify(f)).includes(busca));if(filtro==='hoje')out=out.filter(f=>f.data===today());if(filtro==='sala')out=out.filter(f=>f.sala);if(filtro==='q')out=out.filter(f=>f.status==='Q');if(filtro==='nq')out=out.filter(f=>String(f.status).startsWith('NQ'));$(boxId).innerHTML=out.length?out.map((f,i)=>fichaResumo(f,i,true)).join(''):'<div class="empty">Nenhuma ficha encontrada.</div>'}
function filtrarProf(){filtrarLista(meusDados().f,'buscaProf','filtroProf','listaProf')}
function renderRelatorio(){const box=$('relatorio');if(!isCEO()){box.innerHTML='<h2>Relatório</h2><div class="empty">Essa aba fica liberada para CEO. Seu resultado está na aba Meu Profissional.</div>';return}const f=getFichas(),a=getAbord(),s=stats(f,a);box.innerHTML=`<h2>Relatório do Dia</h2><p class="hint">Aba limpa para leitura do dia. Ranking mensal fica somente na aba Ranking.</p><div class="grid4">${card('Abordagens',s.abord,'blue')}${card('Pesquisas',s.pesq)}${card('Q',s.q,'green')}${card('NQ',s.nq,'yellow')}${card('1 Item',s.nq1,'yellow')}${card('Sala',s.sala,'green')}${card('Conv. sala',pct(s.sala,s.pesq),'blue')}${card('Eficiência Q',pct(s.q,s.pesq),'blue')}</div><div class="section"><div class="fichaTop"><h3>Fichas recentes da operação</h3><span class="tag">${f.length} fichas no arquivo</span></div><div class="grid"><input id="buscaCEO" placeholder="Buscar ficha da operação" oninput="filtrarCEO()"><select id="filtroCEO" onchange="filtrarCEO()"><option value="hoje">Hoje</option><option value="todas">Todas</option><option value="sala">Sala</option><option value="q">Q</option><option value="nq">NQ</option></select></div><div id="listaCEO"></div></div>`;filtrarCEO()}
function filtrarCEO(){filtrarLista(getFichas(),'buscaCEO','filtroCEO','listaCEO')}
function totalRank(){return RANKING_JULHO.reduce((t,r)=>({casais:t.casais+r.casais,vendas:t.vendas+r.vendas,vgv:t.vgv+r.vgv}),{casais:0,vendas:0,vgv:0})}
function renderRanking(){const t=totalRank();$('ranking').innerHTML=`<h2>Ranking de Captação — Julho</h2><p class="hint">Resultado oficial de julho que você enviou.</p><div class="grid"><select><option>Julho 2026</option></select><button class="main" onclick="exportRanking()">Exportar CSV</button></div><div class="rankHead"><div><span>Total geral</span><b>${t.casais} casais</b></div><div><span>Vendas</span><b>${t.vendas}</b></div><div><span>VGV Geral</span><b>${money(t.vgv)}</b></div></div><div class="tableWrap"><table class="table"><tr><th>Pos.</th><th>Profissional</th><th>Casais</th><th>Vendas</th><th>VGV</th><th>Eficiência</th></tr>${RANKING_JULHO.map((r,i)=>`<tr><td class="pos">${i+1}º</td><td><b>${esc(r.nome)}</b></td><td class="ok">${r.casais}</td><td>${r.vendas}</td><td class="money">${money(r.vgv)}</td><td>${pct(r.vendas,r.casais)}</td></tr>`).join('')}<tr><th>Total</th><th>Geral</th><th>${t.casais}</th><th>${t.vendas}</th><th class="money">${money(t.vgv)}</th><th>${pct(t.vendas,t.casais)}</th></tr></table></div>`}
function sxSaldo(nome){const r=RANKING_JULHO.find(x=>norm(x.nome)===norm(nome));return r?(r.casais*100+r.vendas*1000+Math.round(r.vgv/10000)):0}
function renderArena(){const d=getDesafios(),nome=usuario.nome,saldo=sxSaldo(nome),nivel=saldo>=5000?'Elite':saldo>=2500?'Avançado':saldo>=1000?'Pro':'Iniciante',prox=nivel==='Iniciante'?1000:nivel==='Pro'?2500:nivel==='Avançado'?5000:saldo,p=Math.min(100,Math.round((saldo/prox)*100));const opts=RANKING_JULHO.filter(r=>norm(r.nome)!==norm(nome)).map(r=>`<option>${esc(r.nome)}</option>`).join('');const meus=d.filter(x=>norm(x.desafiante)===norm(nome)||norm(x.adversario)===norm(nome));$('arena').innerHTML=`<h2>Arena SX</h2><p class="hint">Arena organizada: escolha adversário, aposte SX e acompanhe desafios.</p><div class="grid4">${card('Meu SX Coin',saldo,'green')}${card('Meu nível',nivel,'blue')}${card('Próximo nível',prox,'yellow')}${card('Ranking base','Julho')}</div><div class="section"><h3>Evolução</h3><div class="bar"><div class="fill" style="width:${p}%"></div></div><p class="hint">${p}% do nível atual.</p></div><div class="section"><h3>Criar desafio</h3><div class="grid"><input value="${esc(nome)}" readonly><select id="adv"><option value="">Escolha o adversário</option>${opts}</select><input id="aposta" inputmode="numeric" placeholder="Aposta SX. Ex: 100"><select id="criterio"><option value="casais">Mais casais</option><option value="vendas">Mais vendas</option><option value="vgv">Maior VGV</option><option value="q">Mais Q</option><option value="sala">Mais sala</option></select></div><button class="main" style="margin-top:8px;width:100%" onclick="criarDesafio()">Criar desafio</button><p id="sxMsg" class="mini"></p></div><div class="section"><h3>Meus desafios</h3><div>${meus.length?meus.map(desafioCard).join(''):'<div class="empty">Você ainda não tem desafios.</div>'}</div></div><div class="section"><h3>Como pontua</h3><div class="grid4">${card('Pesquisa','+10','blue')}${card('Q','+100','green')}${card('Sala','+300','green')}${card('Venda','+1000','yellow')}</div></div>${isCEO()?`<div class="section"><h3>CEO • Definir vencedor</h3>${d.length?d.map(desafioCardCEO).join(''):'<div class="empty">Sem desafios criados.</div>'}</div>`:''}`}
function desafioCard(x){return `<div class="fichaItem"><b>${esc(x.desafiante)} x ${esc(x.adversario)}</b><small>${esc(x.criterio)} • ${x.aposta} SX • ${esc(x.status)}</small>${x.vencedor?`<span class="tag q">Vencedor: ${esc(x.vencedor)}</span>`:'<span class="tag">Aguardando CEO</span>'}</div>`}
function desafioCardCEO(x){return `<div class="fichaItem"><b>${esc(x.desafiante)} x ${esc(x.adversario)}</b><small>${esc(x.criterio)} • ${x.aposta} SX • ${esc(x.status)}</small><div class="grid" style="margin-top:8px"><button class="main" onclick="vencedor(${x.id},'${esc(x.desafiante)}')">${esc(x.desafiante)}</button><button class="secondary" onclick="vencedor(${x.id},'${esc(x.adversario)}')">${esc(x.adversario)}</button></div></div>`}
function criarDesafio(){const adv=$('adv').value,aposta=Number($('aposta').value)||0,criterio=$('criterio').value;if(!adv){$('sxMsg').innerHTML='<span class="danger">Escolha um adversário.</span>';return}if(aposta<=0){$('sxMsg').innerHTML='<span class="danger">Informe a aposta.</span>';return}const d=getDesafios();d.unshift({id:Date.now(),desafiante:usuario.nome,adversario:adv,aposta,criterio,status:'Pendente',vencedor:'',created_at:new Date().toISOString()});setDesafios(d);renderArena()}
function vencedor(id,nome){const d=getDesafios();const i=d.findIndex(x=>x.id===id);if(i>=0){d[i].status='Finalizado';d[i].vencedor=nome;setDesafios(d);renderArena()}}
function renderCEO(){const t=totalRank();$('ceo').innerHTML=`<h2>Portal CEO</h2><p class="hint">Central simplificada. Só ficou o que funciona.</p><div class="ceoMenu"><button class="active" onclick="openCEO('dash',this)">📊 Dashboard</button><button onclick="openCEO('equipe',this)">👥 Equipe</button><button onclick="openCEO('fichas',this)">📋 Fichas</button><button onclick="openCEO('mapa',this)">📍 Mapa</button><button onclick="openCEO('salas',this)">✅ Salas</button><button onclick="openCEO('arenaCEO',this)">🎮 Arena SX</button><button onclick="openCEO('admin',this)">⚙️ Administração</button></div><div id="dash" class="ceoBlock active section"><h3>Dashboard Julho</h3><div class="grid4">${card('Casais',t.casais,'green')}${card('Vendas',t.vendas,'green')}${card('VGV',money(t.vgv),'green')}${card('Eficiência',pct(t.vendas,t.casais),'blue')}</div></div><div id="equipe" class="ceoBlock section"><h3>Equipe</h3><div class="tableWrap"><table class="table"><tr><th>Profissional</th><th>Casais</th><th>Vendas</th><th>VGV</th><th>Ef.</th></tr>${RANKING_JULHO.map(r=>`<tr><td>${esc(r.nome)}</td><td>${r.casais}</td><td>${r.vendas}</td><td class="money">${money(r.vgv)}</td><td>${pct(r.vendas,r.casais)}</td></tr>`).join('')}</table></div></div><div id="fichas" class="ceoBlock section"><h3>Fichas guardadas</h3><div id="ceoFichasBox">${getFichas().length?getFichas().map(f=>fichaResumo(f,0,true)).join(''):'<div class="empty">Sem fichas salvas.</div>'}</div></div><div id="mapa" class="ceoBlock section"><h3>Mapa da Operação</h3>${renderMapa()}</div><div id="salas" class="ceoBlock section"><h3>Salas confirmadas</h3>${getFichas().filter(x=>x.sala).length?getFichas().filter(x=>x.sala).map(f=>fichaResumo(f,0,true)).join(''):'<div class="empty">Nenhum casal em sala confirmado.</div>'}</div><div id="arenaCEO" class="ceoBlock section"><h3>Arena SX</h3><button class="main" onclick="showTab('arena',document.querySelector('[data-tab=arena]'))">Abrir Arena SX</button></div><div id="admin" class="ceoBlock section"><h3>Administração</h3><p class="hint">Área limpa para evitar botão quebrado. Próximo passo: ligar regras no Supabase.</p><button class="secondary" onclick="exportFichas()">Exportar fichas CSV</button></div>`}
function openCEO(id,btn){document.querySelectorAll('.ceoBlock').forEach(x=>x.classList.remove('active'));$(id)?.classList.add('active');document.querySelectorAll('.ceoMenu button').forEach(x=>x.classList.remove('active'));btn?.classList.add('active')}
function renderMapa(){return `<div class="mapGrid">${PONTOS.map(p=>{const profs=RANKING_JULHO.filter(r=>r.ponto===p);return `<div class="pontoCard"><h4>📍 ${esc(p)}</h4>${profs.length?profs.map(r=>`<span class="profDot">${esc(r.nome)} • ${r.casais} casais</span>`).join(''):'<span class="mini">Sem profissional no ranking.</span>'}</div>`}).join('')}</div><p class="hint">Mapa operacional por ponto. GPS real entra na próxima etapa com Supabase/localização.</p>`}
function verFicha(id){const f=getFichas().find(x=>x.id===id);if(!f)return;const campos=[['Captador',f.captador],['Equipe',f.equipe],['Ponto',f.ponto],['Pessoa 1',`${f.nome1} • ${f.idade1} • ${f.profissao1}`],['Pessoa 2',`${f.nome2} • ${f.idade2} • ${f.profissao2}`],['Cidade/Estado',`${f.cidade}/${f.estado}`],['Relacionamento',`${f.relacionamento} • ${f.tempo}`],['Carro',`${f.carro} • ${f.ano}`],['Casa',f.casa],['Cartão',f.cartao],['Renda',f.renda],['Multipropriedade',f.multi],['Cortesia',f.brinde],['Contato',f.contato],['Qualificação',`${f.status} • ${f.motivo}`],['Sala',f.sala?'Sim':'Não'],['Observações',f.obs]];$('modalFichaConteudo').innerHTML=`<h2>Ficha completa</h2><div class="grid">${campos.map(c=>`<div class="campo"><small>${esc(c[0])}</small><b>${esc(c[1]||'-')}</b></div>`).join('')}</div>`;$('modalFicha').classList.remove('hidden')}
function fecharFicha(){$('modalFicha').classList.add('hidden')}
function toggleSala(id){const a=getFichas();const i=a.findIndex(x=>x.id===id);if(i>=0){a[i].sala=!a[i].sala;setFichas(a);renderAll()}}
function csvDownload(name,rows){const csv=rows.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(';')).join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url)}
function exportRanking(){csvDownload('ranking_julho_captapro.csv',[['Pos','Profissional','Casais','Vendas','VGV','Eficiencia'],...RANKING_JULHO.map((r,i)=>[i+1,r.nome,r.casais,r.vendas,r.vgv,pct(r.vendas,r.casais)])])}
function exportFichas(){csvDownload('fichas_captapro.csv',[['Data','Captador','Pessoa1','Pessoa2','Cidade','Contato','Status','Sala','Cortesia'],...getFichas().map(f=>[f.data,f.captador,f.nome1,f.nome2,f.cidade,f.contato,f.status,f.sala?'Sim':'Não',f.brinde])])}
</script>
</body>
</html>
