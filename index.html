<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CaptaPro Versão 3.0 - Equipe Unificada</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#050505,#180000);color:#fff}
.wrap{max-width:900px;margin:auto;padding:12px}
.card{background:#101010;border:1px solid #2b2b2b;border-radius:18px;padding:15px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fichaShare40{width:1080px;max-width:1080px;background:linear-gradient(180deg,#070707,#160000);border:4px solid #5a1717;border-radius:42px;padding:42px;color:#fff}
.fichaShare40.agendamento40{background:linear-gradient(180deg,#0a0700,#1a1200);border-color:#8a6200}
#btnAgendamento40.ativo41{background:linear-gradient(135deg,#ffb300,#7a5200)!important;color:#111!important}
#mapaRealCEO37{height:450px;border-radius:12px;border:1px solid #333}
</style>
</head>
<body>
<div class="wrap">
<div class="top"><div class="logo">Capta<span>Pro</span></div><div class="version">Versão 3.0 - Equipe Unificada</div></div>

<!-- LOGIN -->
<section id="loginBox" class="card">
<h2>Entrada</h2><div class="grid"><input id="email" type="email" placeholder="Seu e-mail"><input id="nome" placeholder="Seu nome completo"></div>
<button class="main" onclick="entrar()">Entrar</button><p id="loginMsg"></p>
</section>

<section id="app" class="hidden">
<div class="tabs">
  <button class="active" onclick="aba('pesquisa',this)">Pesquisa</button>
  <button onclick="aba('relatorio',this)">Relatório</button>
  <button class="adminOnly" onclick="aba('qualificacao',this)">Portal CEO</button>
</div>

<!-- PESQUISA -->
<section id="pesquisa" class="card">
<h2>Pesquisa</h2>
<div class="grid">
  <select id="equipe"><option value="">Equipe Unificada</option><option>UNIFICADA</option></select>
  <select id="ponto"><option value="">Ponto de captação</option><option>Porta dentro do Park</option><option>Park Dream House</option><option>Fábrica Spinassi</option><option>Corredor</option><option>Baden Baden</option><option>Djalma</option><option>Igreja</option><option>Renner</option><option>Guarda-chuvas</option><option>Posto Shell</option></select>
</div>

<div class="pessoaBox"><b>Pessoa 1</b><div class="grid"><input id="nome1" placeholder="Nome"><select id="idade1"><option value="">Idade</option></select><input id="profissao1" placeholder="Profissão"></div></div>
<div class="pessoaBox"><b>Pessoa 2</b><div class="grid"><input id="nome2" placeholder="Nome"><select id="idade2"><option value="">Idade</option></select><input id="profissao2" placeholder="Profissão"></div></div>

<input id="renda" placeholder="Renda Bruta do casal">
<input id="rendaLiquida" placeholder="Renda Líquida">
<input id="contato" placeholder="WhatsApp">

<textarea id="obs" placeholder="Observações"></textarea>

<button class="main" onclick="salvarPesquisa()">Salvar Ficha</button>
<button class="secondary" onclick="confirmarSala21()">✅ Casal em Sala</button>
<p id="formMsg"></p>

<div id="fichaBox" class="card hidden">
  <div id="fichaConteudo"></div>
  <div class="grid">
    <button class="main" onclick="compartilharFicha()">Compartilhar imagem</button>
    <button class="secondary" id="btnAgendamento40" onclick="marcarAgendamento40()">📅 Marcar Agendamento</button>
  </div>
</div>
</section>

<!-- RELATÓRIO -->
<section id="relatorio" class="card hidden">
<h2>Relatório</h2>
<div class="card">
  <h3>Desempenho Individual</h3>
  <canvas id="graficoIndividual" height="200"></canvas>
</div>
</section>

<!-- PORTAL CEO -->
<section id="qualificacao" class="card hidden adminOnly">
<h2>Portal CEO</h2>
<div id="mapaRealCEO37"></div>
<p class="mini">Mapa com localização dos profissionais</p>
</section>
</section>
</div>

<script>
// Variáveis globais
let ultimaFicha = null;
let map = null;
let grafico = null;

// Login
function entrar() {
  document.getElementById('loginBox').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
}

// Pesquisa
function salvarPesquisa() {
  ultimaFicha = {
    nome1: document.getElementById('nome1').value,
    nome2: document.getElementById('nome2').value,
    renda: document.getElementById('renda').value,
    rendaLiquida: document.getElementById('rendaLiquida').value,
    contato: document.getElementById('contato').value,
    obs: document.getElementById('obs').value
  };
  renderFicha();
}

function renderFicha() {
  if (!ultimaFicha) return;
  const html = `
    <div class="fichaShare40 ${ultimaFicha.agendamento ? 'agendamento40' : ''}">
      <h2>Ficha Completa do Casal</h2>
      <p><strong>Nome 1:</strong> ${ultimaFicha.nome1 || '-'}</p>
      <p><strong>Nome 2:</strong> ${ultimaFicha.nome2 || '-'}</p>
      <p><strong>Renda Bruta:</strong> ${ultimaFicha.renda || '-'}</p>
      ${ultimaFicha.rendaLiquida ? `<p><strong>Renda Líquida:</strong> ${ultimaFicha.rendaLiquida}</p>` : ''}
      <p><strong>Contato:</strong> ${ultimaFicha.contato || '-'}</p>
    </div>
  `;
  document.getElementById('fichaConteudo').innerHTML = html;
  document.getElementById('fichaBox').classList.remove('hidden');
}

function marcarAgendamento40() {
  if (!ultimaFicha) return alert('Salve a ficha primeiro');
  ultimaFicha.agendamento = !ultimaFicha.agendamento;
  const btn = document.getElementById('btnAgendamento40');
  btn.classList.toggle('ativo41');
  btn.textContent = ultimaFicha.agendamento ? '✅ Agendamento Marcado' : '📅 Marcar Agendamento';
  renderFicha();
}

function compartilharFicha() {
  alert('Ficha compartilhada com sucesso!');
}

function confirmarSala21() {
  alert('Casal em sala confirmado!');
}

// Relatório com gráfico
function carregarRelatorio() {
  const ctx = document.getElementById('graficoIndividual');
  if (grafico) grafico.destroy();
  grafico = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Abordagens', 'Pesquisas', 'Q', 'Sala'],
      datasets: [{ label: 'Desempenho Hoje', data: [15, 9, 6, 4], backgroundColor: ['#ef1b24', '#00e676', '#ffd54f', '#00c2ff'] }]
    }
  });
}

// Mapa no Portal CEO
function carregarMapa() {
  const container = document.getElementById('mapaRealCEO37');
  if (map) map.remove();
  map = L.map('mapaRealCEO37').setView([-22.74, -45.59], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  L.marker([-22.74, -45.59]).addTo(map).bindPopup('Profissional 1 - Online').openPopup();
}

// Troca de abas
function aba(id) {
  document.querySelectorAll('#pesquisa, #relatorio, #qualificacao').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  
  if (id === 'relatorio') carregarRelatorio();
  if (id === 'qualificacao') carregarMapa();
}
</script>
</body>
</html>
