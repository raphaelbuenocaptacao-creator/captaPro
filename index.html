<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaptaPro 6.0 PRO</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #e8e8e8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; line-height: 1.5; }
.wrap { max-width: 1200px; margin: 0 auto; padding: 16px; }
.top { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.logo { font-size: 32px; font-weight: 900; letter-spacing: -1px; }
.logo .pro { color: #ef1b24; }
.user-info { display: flex; align-items: center; gap: 12px; }
.user-info span { font-size: 12px; color: #888; }
.btn { background: linear-gradient(135deg, #ef1b24, #cc1520); border: none; color: #fff; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 14px; transition: all .2s; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(239,27,36,.3); }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn.loading { position: relative; color: transparent; }
.btn.loading::after { content: ''; position: absolute; width: 16px; height: 16px; top: 50%; left: 50%; margin: -8px 0 0 -8px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; }
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 11px; color: #777; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; }
input, select, textarea {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid #2a2a2a;
  background: #0a0a0a;
  color: #e8e8e8;
  font-size: 14px;
  transition: border .2s, box-shadow .2s;
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: #ef1b24;
  box-shadow: 0 0 0 3px rgba(239,27,36,.12);
}
/* Correção para autofill em navegadores */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {
  -webkit-box-shadow: 0 0 0 30px #0a0a0a inset !important;
  box-shadow: 0 0 0 30px #0a0a0a inset !important;
  -webkit-text-fill-color: #e8e8e8 !important;
}
input:-webkit-autofill {
  -webkit-text-fill-color: #e8e8e8 !important;
}
input:-webkit-autofill::first-line {
  font-size: 14px;
}
/* Correção para select dropdown */
select {
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23e8e8e8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 10px center;
  background-size: 20px;
  padding-right: 36px;
}
textarea { min-height: 60px; resize: vertical; }
select option { background: #1a1a1a; }
input::placeholder, textarea::placeholder { color: #555; }

/* ===== TABS ===== */
.tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.tabs button {
  background: #0f0f0f;
  border: 1px solid #222;
  padding: 12px 10px;
  border-radius: 12px;
  color: #aaa;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  transition: all .2s;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  min-height: 70px;
}
.tabs button:hover { background: #181818; color: #fff; }
.tabs button.active {
  background: linear-gradient(135deg, #ef1b24, #cc1520);
  color: #fff;
  border-color: #ef1b24;
  box-shadow: 0 4px 16px rgba(239,27,36,.2);
}
.tabs button .tab-icon { font-size: 24px; display: block; }

/* ===== PAINÉIS DE NÚMEROS ===== */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin: 10px 0; }
.stat-card {
  background: #0f0f0f;
  border: 1px solid #1a1a1a;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  min-height: 70px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.stat-card .label { font-size: 11px; color: #777; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
.stat-card .value { font-size: 24px; font-weight: 900; color: #fff; }
.stat-card .value.blue { color: #00c2ff; }
.stat-card .value.green { color: #00ff88; }
.stat-card .value.gold { color: #ffd700; }
.stat-card .value.small { font-size: 14px; }

/* ===== SEÇÕES ===== */
.section { background: #0f0f0f; border: 1px solid #1a1a1a; padding: 16px; border-radius: 12px; margin-bottom: 16px; }
.section-title { font-size: 14px; font-weight: 900; margin-bottom: 12px; color: #fff; }
.map-notice { font-size: 12px; color: #888; margin-bottom: 12px; }

/* ===== TABELAS ===== */
.table-wrap { overflow-x: auto; }
.table { width: 100%; border-collapse: collapse; font-size: 12px; }
.table th { background: #1a1a1a; padding: 8px; text-align: left; font-weight: 700; color: #aaa; border-bottom: 1px solid #2a2a2a; }
.table td { padding: 8px; border-bottom: 1px solid #1a1a1a; }
.table tr:hover { background: #1a1a1a; }
.table td.blue { color: #00c2ff; font-weight: 700; }
.table td.green { color: #00ff88; font-weight: 700; }
.table td.gold { color: #ffd700; font-weight: 700; }
.table td.money { font-family: 'Courier New', monospace; }
.table td.pos { font-weight: 900; font-size: 14px; }
.table tr.top1 { background: rgba(255,215,0,.1); }
.table tr.top2 { background: rgba(192,192,192,.1); }
.table tr.top3 { background: rgba(205,127,50,.1); }

/* ===== CAIXAS ===== */
.box { background: #0f0f0f; border: 1px solid #1a1a1a; padding: 16px; border-radius: 12px; margin-bottom: 16px; }
.box.error { border-color: #ef1b24; background: rgba(239,27,36,.05); }
.box.success { border-color: #00ff88; background: rgba(0,255,136,.05); }
.box.info { border-color: #00c2ff; background: rgba(0,194,255,.05); }
.empty { text-align: center; padding: 40px 20px; color: #777; }
.empty .icon { font-size: 48px; display: block; margin-bottom: 12px; }
.hidden { display: none !important; }
.ficha-card { background: #1a1a1a; border: 1px solid #2a2a2a; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.ficha-card .info { flex: 1; }
.ficha-card .info b { display: block; margin-bottom: 4px; color: #fff; }
.ficha-card .info small { display: block; font-size: 11px; color: #888; margin-bottom: 2px; }
.ficha-card .tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag { background: #2a2a2a; color: #aaa; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
.tag.q { background: rgba(0,255,136,.2); color: #00ff88; }
.tag.nq { background: rgba(255,215,0,.2); color: #ffd700; }

/* ===== NOTIFICAÇÕES ===== */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
.toast { background: #1a1a1a; border: 1px solid #2a2a2a; color: #e8e8e8; padding: 14px 18px; border-radius: 10px; margin-bottom: 8px; min-width: 250px; animation: slideIn .3s ease-out; box-shadow: 0 8px 24px rgba(0,0,0,.4); }
.toast.success { border-color: #00ff88; background: rgba(0,255,136,.1); color: #00ff88; }
.toast.error { border-color: #ef1b24; background: rgba(239,27,36,.1); color: #ef1b24; }
.toast.info { border-color: #00c2ff; background: rgba(0,194,255,.1); color: #00c2ff; }
@keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== RESPONSIVO ===== */
@media (max-width: 768px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .top { flex-direction: column; gap: 10px; text-align: center; }
  .tabs { grid-template-columns: repeat(3, 1fr); }
  .tabs button { font-size: 11px; padding: 10px 8px; min-height: 65px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .stat-card .value { font-size: 20px; }
  .ficha-card { flex-direction: column; align-items: stretch; }
  .tools { flex-direction: column; }
  #mapaCEO60 { height: 350px; min-height: 350px; }
  .table { font-size: 12px; }
  .table td, .table th { padding: 6px 4px; }
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .stat-card { min-height: 60px; padding: 8px; }
  .stat-card .value { font-size: 18px; }
  .logo { font-size: 28px; }
  /* Melhorias mobile */
  input, select, textarea {
    font-size: 16px; /* Evita zoom em iOS */
  }
  .btn { font-size: 16px; padding: 12px 20px; }
  .top { padding: 12px 16px; }
  .wrap { padding: 8px; }
}
</style>
</head>
<body>
<div class="wrap">
  <!-- HEADER -->
  <div class="top">
    <div>
      <div class="logo"><span class="pro">Capta</span>Pro <span style="font-size:12px;color:#888">v6.0</span></div>
      <div style="font-size:11px;color:#888">Bueno Invest</div>
    </div>
    <div class="user-info">
      <div>
        <div id="userNameDisplay" style="font-weight:700">Visitante</div>
        <div id="userRoleDisplay" style="font-size:11px;color:#888">Profissional</div>
      </div>
      <button id="btnSair" class="btn" style="display:none">Sair</button>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="loginBox" class="box">

    </div>
    <div class="form-group">
      <label>Nome Completo</label>
      <input id="nome" type="text" placeholder="Seu nome completo">
    </div>

  <!-- APP -->
  <div id="app" class="hidden">
    <!-- ABAS -->
    <div class="tabs">
      <button role="tab" aria-selected="true" class="tab-btn active" data-tab="pesquisa"><span class="tab-icon">📋</span>Pesquisa</button>
      <button role="tab" aria-selected="false" class="tab-btn" data-tab="profissional"><span class="tab-icon">👤</span>Meu Profissional</button>
      <button role="tab" aria-selected="false" class="tab-btn" data-tab="relatorio"><span class="tab-icon">📊</span>Relatório</button>
      <button role="tab" aria-selected="false" class="tab-btn" data-tab="ranking"><span class="tab-icon">🏆</span>Ranking</button>
      <button role="tab" aria-selected="false" class="tab-btn" data-tab="arena"><span class="tab-icon">⚔️</span>Arena SX</button>
      <button role="tab" aria-selected="false" class="tab-btn adminOnly hidden" data-tab="ceo"><span class="tab-icon">👑</span>Portal CEO</button>
    </div>

    <!-- CONTEÚDO DAS ABAS -->
    <div id="pesquisaContent"></div>
    <div id="profissionalContent" class="hidden"></div>
    <div id="relatorioContent" class="hidden"></div>
    <div id="rankingContent" class="hidden"></div>
    <div id="arenaContent" class="hidden"></div>
    <div id="portalContent" class="hidden"></div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<script>
'use strict';

// ============================================================
// CONFIGURAÇÃO GLOBAL
// ============================================================
const CEOS = ['raphaelbueno.captacao@gmail.com'];
const PONTOS_FIXOS = [
  {nome: 'Porta dentro do Park', lat: -22.74015, lng: -45.59206},
  {nome: 'Park Dream House', lat: -22.74050, lng: -45.59150},
  {nome: 'Fábrica Spinassi', lat: -22.73980, lng: -45.59250},
  {nome: 'Corredor', lat: -22.74100, lng: -45.59100},
  {nome: 'Baden Baden', lat: -22.74200, lng: -45.59300},
  {nome: 'Djalma', lat: -22.73900, lng: -45.59000},
  {nome: 'Igreja', lat: -22.74300, lng: -45.59400},
  {nome: 'Renner', lat: -22.73800, lng: -45.58900},
  {nome: 'Guarda-chuvas', lat: -22.74400, lng: -45.59500},
  {nome: 'Posto Shell', lat: -22.73700, lng: -45.58800}
];

const RANKING_FIXO = [
  {nome: 'João Silva', casais: 45, vendas: 12, vgv: 450000, ponto: 'Porta dentro do Park'},
  {nome: 'Maria Santos', casais: 38, vendas: 10, vgv: 380000, ponto: 'Park Dream House'},
  {nome: 'Pedro Costa', casais: 32, vendas: 8, vgv: 320000, ponto: 'Fábrica Spinassi'},
  {nome: 'Ana Oliveira', casais: 28, vendas: 7, vgv: 280000, ponto: 'Corredor'},
  {nome: 'Carlos Ferreira', casais: 25, vendas: 6, vgv: 250000, ponto: 'Baden Baden'}
];

let usuarioEmail = '';
let usuarioNome = '';
let role = 'profissional';
let ultimaFicha = null;
let mapaInstance = null;
let db = null; // Supabase desabilitado para modo offline

// ============================================================
// FUNÇÕES UTILITÁRIAS
// ============================================================
const E = id => document.getElementById(id);
const V = id => (E(id)?.value || '').trim();
const H = (id, html) => { const el = E(id); if (el) el.innerHTML = html; };
const S = (id, text) => { const el = E(id); if (el) el.textContent = text; };
const esc = str => String(str).replace(/[&<>"']/g, c => ({
  '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
})[c]);

function saveLocal(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
function parseLocal(key, def) { try { return JSON.parse(localStorage.getItem(key) || 'null') || def; } catch { return def; } }
function getEmail() { return usuarioEmail; }
function hoje() { return new Date().toISOString().split('T')[0]; }
function mesmaData(f) { return f.data === hoje(); }
function isSala(f) { return f.levou_sala === 'Sim'; }
function moeda(v) { return new Intl.NumberFormat('pt-BR', {style: 'currency', currency: 'BRL'}).format(v); }
function pct(n, d) { return d > 0 ? Math.round(n / d * 100) + '%' : '—'; }
function login() { return parseLocal('loginSimples', null); }

// ============================================================
// TOAST NOTIFICATIONS
// ============================================================
function toast(msg, type = 'info', duration = 3000) {
  const container = E('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), duration);
}

// ============================================================
// LOGIN / LOGOUT
// ============================================================
async function entrar() {
  const email = V('email');
  const nome = V('nome');
  const btn = E('btnEntrar');

  if (!email || !nome) {
    toast('Preencha e-mail e nome para entrar.', 'error');
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    toast('E-mail inválido.', 'error');
    return;
  }

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    saveLocal('loginSimples', {email, nome, ts: Date.now()});
    usuarioEmail = email;
    usuarioNome = nome;
    role = CEOS.includes(email.toLowerCase()) ? 'ceo' : 'profissional';
    S('userNameDisplay', nome);
    S('userRoleDisplay', role === 'ceo' ? '👑 CEO' : 'Profissional');
    E('btnSair').classList.remove('hidden');
    E('loginBox').classList.add('hidden');
    E('app').classList.remove('hidden');
    document.querySelectorAll('.adminOnly').forEach(el => {
      el.classList.toggle('hidden', role !== 'ceo');
    });
    popularIdades();
    atualizarContadorAbordagens();
    renderPesquisa();
    toast(`Bem-vindo, ${nome}! 👋`, 'success');
  } catch (err) {
    console.error(err);
    toast('Erro ao entrar. Tente novamente.', 'error');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function sair() {
  if (!confirm('Tem certeza que deseja sair?')) return;
  localStorage.removeItem('loginSimples');
  location.reload();
}

// ============================================================
// POPULANDO SELECTS DE IDADE
// ============================================================
function popularIdades() {
  ['idade1', 'idade2'].forEach(id => {
    const sel = E(id);
    if (!sel) return;
    const current = sel.value;
    sel.innerHTML = '<option value="">Idade</option>';
    for (let i = 18; i <= 80; i++) {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = i + ' anos';
      if (String(i) === current) opt.selected = true;
      sel.appendChild(opt);
    }
  });
}

// ============================================================
// RENDER: PESQUISA
// ============================================================
function renderPesquisa() {
  const container = E('pesquisaContent');
  const abordagens = parseLocal('abordagens_' + hoje(), []);
  
  container.innerHTML = `
    <div class="section">
      <div class="section-title">📋 Nova Pesquisa</div>

      <button id="btnAbordagem" class="btn" style="width:100%;margin-bottom:16px">➕ REGISTRAR ABORDAGEM</button>
    </div>

    <div class="section">
      <div class="form-group">
        <label>Equipe</label>
        <select id="equipe"><option>1. Equipe</option><option>PARK</option><option>EXTERNA</option></select>
      </div>
      <div class="form-group">
        <label>Ponto de Captação</label>
        <select id="ponto">
          <option>2. Ponto de captação</option>
          ${PONTOS_FIXOS.map(p => `<option>${p.nome}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="section">
      <div class="section-title">👤 Pessoa 1</div>
      <div class="form-group">
        <label>Nome</label>
        <input id="nome1" type="text" placeholder="Nome">
      </div>
      <div class="form-group">
        <label>Idade</label>
        <select id="idade1"><option>Idade</option></select>
      </div>
      <div class="form-group">
        <label>Profissão</label>
        <input id="profissao1" type="text" placeholder="Profissão" list="profissoes">
      </div>
    </div>

    <div class="section">
      <div class="section-title">👤 Pessoa 2 <span style="background:#00ff88;color:#000;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700">opcional</span></div>
      <div class="form-group">
        <label>Nome</label>
        <input id="nome2" type="text" placeholder="Nome">
      </div>
      <div class="form-group">
        <label>Idade</label>
        <select id="idade2"><option>Idade</option></select>
      </div>
      <div class="form-group">
        <label>Profissão</label>
        <input id="profissao2" type="text" placeholder="Profissão" list="profissoes">
      </div>
    </div>

    <div class="section">
      <div class="form-group">
        <label>Estado</label>
        <select id="estado"><option>Estado</option><option>SP</option><option>RJ</option><option>MG</option><option>PR</option><option>SC</option><option>RS</option><option>GO</option><option>DF</option><option>BA</option><option>CE</option><option>PE</option><option>ES</option><option>MT</option><option>MS</option><option>AM</option></select>
      </div>
      <div class="form-group">
        <label>Cidade</label>
        <input id="cidade" type="text" placeholder="Cidade">
      </div>
    </div>

    <div class="section">
      <div class="form-group">
        <label>Relacionamento</label>
        <select id="relacionamento"><option>Relacionamento</option><option>Casados</option><option>União estável</option><option>Namorados</option><option>Noivos</option><option>Solteiro</option></select>
      </div>
      <div class="form-group">
        <label>Tempo Juntos</label>
        <select id="tempo"><option>Tempo juntos</option><option>Menos de 1 ano</option><option>1 ano</option><option>2 anos</option><option>3 anos</option><option>4 anos</option><option>5 anos</option><option>6 anos</option><option>7 anos</option><option>8 anos</option><option>9 anos</option><option>10 anos</option><option>Mais de 10 anos</option></select>
      </div>
    </div>

    <div class="section">
      <div class="form-group">
        <label>Carro</label>
        <input id="nomeCarro" type="text" placeholder="Ex: Onix">
      </div>
      <div class="form-group">
        <label>Ano do Carro</label>
        <input id="anoCarro" type="text" placeholder="Ex: 2015">
      </div>
    </div>

    <div class="section">
      <div class="form-group">
        <label>Casa Própria?</label>
        <select id="casa"><option>Casa própria?</option><option>Sim</option><option>Não</option></select>
      </div>
      <div class="form-group">
        <label>Cartão de Crédito?</label>
        <select id="cartao"><option>Cartão de crédito?</option><option>Sim</option><option>Não</option></select>
      </div>
    </div>

    <div class="section">
      <div class="form-group">
        <label>Renda Bruta do Casal (R$)</label>
        <input id="renda" type="number" placeholder="Ex: 10000">

// ============================================================
// REGISTRAR ABORDAGEM
// ============================================================
function registrarAbordagem() {
  const btn = E('btnAbordagem');
  const abordagens = parseLocal('abordagens_' + hoje(), []);
  abordagens.push({ts: Date.now(), usuario: usuarioNome});
  saveLocal('abordagens_' + hoje(), abordagens);
  atualizarContadorAbordagens();
  btn.textContent = '✅ Registrada!';
  btn.style.background = '#00ff88';
  btn.style.color = '#000';
  setTimeout(() => {
    btn.textContent = '➕ REGISTRAR ABORDAGEM';
    btn.style.background = '';
    btn.style.color = '';
  }, 1200);
  toast('Abordagem registrada! 🎯', 'success');
}

function atualizarContadorAbordagens() {
  const abordagens = parseLocal('abordagens_' + hoje(), []);
  const el = document.querySelector('[data-tab="pesquisa"]');
  if (el) {
    const badge = el.querySelector('.badge') || document.createElement('span');
    badge.className = 'badge';
    badge.textContent = abordagens.length;
    badge.style.cssText = 'position:absolute;top:-8px;right:-8px;background:#ef1b24;color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900';
    if (!el.querySelector('.badge')) el.style.position = 'relative';
  }
}

// ============================================================
// SALVAR FICHA
// ============================================================
async function salvarFicha() {
  const nome1 = V('nome1');
  if (!nome1) {
    toast('Preencha pelo menos o nome da pessoa 1.', 'error');
    return;
  }

  const ficha = {
    usuario: usuarioNome,
    email_usuario: usuarioEmail,
    data: hoje(),
    equipe: V('equipe'),
    ponto: V('ponto'),
    nome1, idade1: V('idade1'), profissao1: V('profissao1'),
    nome2: V('nome2'), idade2: V('idade2'), profissao2: V('profissao2'),
    estado: V('estado'), cidade: V('cidade'),
    relacionamento: V('relacionamento'), tempo: V('tempo'),
    nomeCarro: V('nomeCarro'), anoCarro: V('anoCarro'),
    casa: V('casa'), cartao: V('cartao'),
    renda: parseInt(V('renda')) || 0,
    multi: V('multi'), brinde: V('brinde'), contato: V('contato'),
    levou_sala: 'Não', sala_status: '',
    qualificacao_automatica: 'N/I'
  };

  const btn = E('btnSalvar');
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const fichas = parseLocal('fichas_offline', []);
    fichas.push(ficha);
    saveLocal('fichas_offline', fichas);
    ultimaFicha = ficha;
    renderFichaBox(ficha);
    toast('Ficha salva com sucesso! ✅', 'success');
  } catch (err) {
    console.error(err);
    toast('Erro ao salvar ficha.', 'error');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

// ============================================================
// CONFIRMAR SALA
// ============================================================
function confirmarSala() {
  if (!ultimaFicha) {
    toast('Salve uma ficha primeiro.', 'error');
    return;
  }
  const btn = E('btnSala');
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const fichas = parseLocal('fichas_offline', []);
    const idx = fichas.findIndex(f => f.nome1 === ultimaFicha.nome1 && f.data === hoje());
    if (idx >= 0) {
      fichas[idx].levou_sala = 'Sim';
      fichas[idx].sala_status = 'Confirmado';
      saveLocal('fichas_offline', fichas);
    }
    toast('Casal confirmado em sala! 🎉', 'success');
  } catch (err) {
    console.error(err);
    toast('Erro ao confirmar sala.', 'error');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

// ============================================================
// RENDER FICHA BOX
// ============================================================
function renderFichaBox(f) {
  const q = f.qualificacao_automatica || 'N/I';
  const qClass = q === 'QUALIFICADO' ? 'q' : q === 'POTENCIAL' ? 'nq' : '';
  H('fichaBox', `
    <div class="ficha-card">
      <div class="info">
        <b>${esc(f.nome1)}${f.nome2 ? ' & ' + esc(f.nome2) : ''}</b>
        <small>${esc(f.cidade || '')}${f.estado ? ' — ' + esc(f.estado) : ''} · ${esc(f.relacionamento || '')} · Renda: ${f.renda ? moeda(f.renda) : 'N/I'}</small>
        <small>Ponto: ${esc(f.ponto || 'N/I')} · Brinde: ${esc(f.brinde || 'N/I')}</small>
      </div>
      <div class="tags">
        <span class="tag ${qClass}">${esc(q)}</span>
        ${f.contato ? `<span class="tag">${esc(f.contato)}</span>` : ''}
      </div>
    </div>
  `);
  E('fichaBox').classList.remove('hidden');
  E('fichaBox').scrollIntoView({behavior:'smooth', block:'nearest'});
}

// ============================================================
// LIMPAR FORMULÁRIO
// ============================================================
function limparFormulario() {
  if (!confirm('Limpar todos os campos?')) return;
  const campos = ['nome1','idade1','profissao1','nome2','idade2','profissao2',
    'estado','cidade','relacionamento','tempo','nomeCarro','anoCarro',
    'casa','cartao','renda','multi','brinde','contato','equipe','ponto'];
  campos.forEach(id => {
    const el = E(id);
    if (el) el.value = '';
  });
  E('fichaBox').classList.add('hidden');
  ultimaFicha = null;
  toast('Formulário limpo.', 'info', 2000);
}

// ============================================================
// RENDER: RELATÓRIO
// ============================================================
function renderRelatorio() {
  const container = E('relatorioContent');
  const fichas = parseLocal('fichas_offline', []);
  const hoje_fichas = fichas.filter(mesmaData);
  const salas = fichas.filter(isSala);
  const abordagens = parseLocal('abordagens_' + hoje(), []);

  const porPonto = {};
  fichas.forEach(f => {
    const p = f.ponto || 'Sem ponto';
    if (!porPonto[p]) porPonto[p] = {fichas: 0, salas: 0};
    porPonto[p].fichas++;
    if (isSala(f)) porPonto[p].salas++;
  });

  container.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="label">Total Fichas</div><div class="value">${fichas.length}</div></div>
      <div class="stat-card"><div class="label">Fichas Hoje</div><div class="value blue">${hoje_fichas.length}</div></div>
      <div class="stat-card"><div class="label">Salas</div><div class="value green">${salas.length}</div></div>
      <div class="stat-card"><div class="label">Abord. Hoje</div><div class="value blue">${abordagens.length}</div></div>
      <div class="stat-card"><div class="label">Conv. Sala</div><div class="value white">${pct(salas.length, fichas.length)}</div></div>
    </div>

    <div class="section">
      <div class="section-title">📍 Fichas por Ponto de Captação</div>
      <div class="table-wrap">
        <table class="table">
          <thead><tr><th>Ponto</th><th>Fichas</th><th>Salas</th><th>Conv.</th></tr></thead>
          <tbody>
            ${Object.entries(porPonto).sort((a,b) => b[1].fichas - a[1].fichas).map(([p, v]) => `
              <tr>
                <td>${esc(p)}</td>
                <td class="blue">${v.fichas}</td>
                <td class="green">${v.salas}</td>
                <td>${pct(v.salas, v.fichas)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ============================================================
// RENDER: RANKING
// ============================================================
function renderRanking() {
  const container = E('rankingContent');
  const fichas = parseLocal('fichas_offline', []);
  
  const porProf = {};
  fichas.forEach(f => {
    const u = f.usuario || 'Desconhecido';
    if (!porProf[u]) porProf[u] = {fichas: 0, salas: 0};
    porProf[u].fichas++;
    if (isSala(f)) porProf[u].salas++;
  });

  const sorted = Object.entries(porProf).sort((a,b) => b[1].fichas - a[1].fichas);

  container.innerHTML = `
    <div class="section">
      <div class="section-title">🏆 Ranking por Fichas Captadas</div>
      <div class="table-wrap">
        <table class="table">
          <thead><tr><th>#</th><th>Profissional</th><th>Fichas</th><th>Salas</th><th>Conv.</th></tr></thead>
          <tbody>
            ${sorted.map(([u, v], i) => `
              <tr class="${i===0?'top1':i===1?'top2':i===2?'top3':''}">
                <td class="pos">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</td>
                <td>${esc(u)}</td>
                <td class="blue">${v.fichas}</td>
                <td class="green">${v.salas}</td>
                <td>${pct(v.salas, v.fichas)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

          <table class="table">
            <thead><tr><th>Profissional</th><th>Fichas</th><th>Salas</th><th>Conv.</th></tr></thead>
            <tbody>
              ${Object.entries(porProf).sort((a,b) => b[1].fichas - a[1].fichas).map(([u, v]) => `
                <tr>

                  <td class="blue">${v.fichas}</td>

// ============================================================
// INICIALIZAR MAPA
// ============================================================
function initMapa(fichas) {
  const el = E('mapaCEO60');
  if (!el) return;

  // Destruir instância anterior
  if (mapaInstance) {
    mapaInstance.remove();
    mapaInstance = null;
  }

  mapaInstance = L.map('mapaCEO60').setView([-22.74015, -45.59206], 16);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19
  }).addTo(mapaInstance);

  const contagem = {};
  (fichas || []).forEach(f => {
    if (f.ponto) contagem[f.ponto] = (contagem[f.ponto] || 0) + 1;
  });

  PONTOS_FIXOS.forEach(p => {
    const n = contagem[p.nome] || 0;
    const radius = Math.max(8, Math.min(30, 8 + n * 2));
    L.circleMarker([p.lat, p.lng], {
      radius,
      color: '#00c2ff',
      fillColor: n > 0 ? '#ef1b24' : '#00c2ff',
      fillOpacity: 0.7,
      weight: 2
    }).addTo(mapaInstance).bindPopup(`<b>${p.nome}</b><br>Fichas: ${n}`);
  });
}

// ============================================================
// NAVEGAÇÃO DE ABAS
// ============================================================
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-selected', 'false');
    });
    document.querySelectorAll('[id$="Content"]').forEach(c => c.classList.add('hidden'));
    
    btn.classList.add('active');
    btn.setAttribute('aria-selected', 'true');
    const tab = btn.dataset.tab;
    const contentId = tab + 'Content';
    const el = E(contentId);
    if (el) {
      el.classList.remove('hidden');
      if (tab === 'relatorio') renderRelatorio();
      else if (tab === 'ranking') renderRanking();
      else if (tab === 'arena') renderArena();
      else if (tab === 'ceo') renderPortalCEO();
    }
  });
});

// ============================================================
// AUTO-LOGIN
// ============================================================
(function autoLogin() {
  const saved = login();
  if (saved?.email && saved?.nome) {
    usuarioEmail = saved.email;
    usuarioNome = saved.nome;
    role = CEOS.includes(saved.email.toLowerCase()) ? 'ceo' : 'profissional';
    S('userNameDisplay', saved.nome);
    S('userRoleDisplay', role === 'ceo' ? '👑 CEO' : 'Profissional');
    E('btnSair').classList.remove('hidden');
    E('loginBox').classList.add('hidden');
    E('app').classList.remove('hidden');
    document.querySelectorAll('.adminOnly').forEach(el => {
      el.classList.toggle('hidden', role !== 'ceo');
    });
    popularIdades();
    atualizarContadorAbordagens();
    renderPesquisa();
  }
})();
