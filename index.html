<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CaptaPro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#050505,#170000);color:#fff}
.container{max-width:760px;margin:auto;padding:14px}
.logo{text-align:center;margin:18px 0}.logo h1{margin:0;font-size:34px}.logo span{color:#ff3131}.sub{color:#bbb}
.card{background:#111;border:1px solid #292929;border-radius:18px;padding:16px;margin-bottom:16px;box-shadow:0 0 25px rgba(229,9,20,.15)}
h2{border-left:4px solid #e50914;padding-left:10px}
input,select,textarea,button{width:100%;box-sizing:border-box;margin-top:10px;padding:14px;border-radius:12px;border:1px solid #333;background:#050505;color:#fff;font-size:15px}
textarea{min-height:90px}button{background:linear-gradient(135deg,#e50914,#ff3131);border:none;font-weight:bold}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.hidden{display:none}.ok{color:#00e676;font-weight:bold}.erro{color:#ff5252;font-weight:bold}
.resultado{font-size:22px;text-align:center;padding:16px;border-radius:16px;margin-top:12px}.q{background:#063d1f;color:#00e676}.nq{background:#3d0606;color:#ff5252}.item{background:#3d3006;color:#ffd54f}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<div class="logo"><h1>Capta<span>Pro</span></h1><div class="sub">Pesquisa com qualificação automática</div></div>

<div id="loginBox" class="card">
<h2>Entrada</h2>
<input id="email" type="email" placeholder="Seu e-mail">
<input id="captadorNome" placeholder="Seu nome">
<button onclick="entrar()">Entrar</button>
<p id="loginMsg"></p>
</div>

<div id="aguardandoBox" class="card hidden">
<h2>Aguardando aprovação</h2>
<p class="erro">Seu e-mail ainda não foi aprovado pelo gestor.</p>
<button onclick="location.reload()">Voltar</button>
</div>

<div id="formBox" class="card hidden">
<h2>Nova Pesquisa</h2>

<div class="grid">
<select id="equipe"><option value="">Equipe</option><option>PARK</option><option>EXTERNA</option></select>
<select id="ponto_captacao">
<option value="">Ponto de captação</option><option>Porta dentro do Park</option><option>Spinassi Avenida</option><option>Fábrica Spinassi</option><option>Corredor</option><option>Baden Baden</option><option>Guarda-chuvas</option><option>Igreja</option><option>Djalma</option><option>Renner</option><option>Rua Roda Gigante</option>
</select>
</div>

<input id="convidado_1" placeholder="Nome do senhor">
<select id="idade_1"><option value="">Idade do senhor</option></select>

<select id="profissao_1">
<option value="">Profissão do senhor</option>
<option>Empresário</option><option>Comerciante</option><option>Autônomo</option><option>Servidor público</option><option>Médico</option><option>Dentista</option><option>Advogado</option><option>Engenheiro</option><option>Arquiteto</option><option>Administrador</option><option>Gerente</option><option>Diretor</option><option>Consultor</option><option>Representante comercial</option><option>Professor</option><option>Contador</option><option>Policial</option><option>Militar</option><option>Aposentado</option><option>Produtor rural</option><option>Investidor</option>
<option>Operador de caixa</option><option>Zelador</option><option>Secretária</option><option>Auxiliar</option><option>Assistente</option><option>Avon/Natura/Multinível</option><option>Gari</option><option>Vendedor ambulante</option><option>Motoboy</option><option>Do lar</option><option>Estoquista</option><option>Eletricista</option><option>Diarista</option><option>Doméstica</option><option>Garçom</option><option>Manicure</option><option>Pedreiro</option><option>Atendente</option><option>Balconista</option><option>Babá</option><option>Porteiro</option><option>Frentista</option><option>Estudante</option><option>Uber/App/Freelancer</option><option>Outro</option>
</select>

<input id="convidado_2" placeholder="Nome da senhora">
<select id="idade_2"><option value="">Idade da senhora</option></select>

<select id="profissao_2">
<option value="">Profissão da senhora</option>
<option>Empresária</option><option>Comerciante</option><option>Autônoma</option><option>Servidora pública</option><option>Médica</option><option>Dentista</option><option>Advogada</option><option>Engenheira</option><option>Arquiteta</option><option>Administradora</option><option>Gerente</option><option>Diretora</option><option>Consultora</option><option>Representante comercial</option><option>Professora</option><option>Contadora</option><option>Policial</option><option>Militar</option><option>Aposentada</option><option>Produtora rural</option><option>Investidora</option>
<option>Operador de caixa</option><option>Zelador</option><option>Secretária</option><option>Auxiliar</option><option>Assistente</option><option>Avon/Natura/Multinível</option><option>Gari</option><option>Vendedor ambulante</option><option>Motoboy</option><option>Do lar</option><option>Estoquista</option><option>Eletricista</option><option>Diarista</option><option>Doméstica</option><option>Garçom</option><option>Manicure</option><option>Pedreiro</option><option>Atendente</option><option>Balconista</option><option>Babá</option><option>Porteiro</option><option>Frentista</option><option>Estudante</option><option>Uber/App/Freelancer</option><option>Outro</option>
</select>

<div class="grid">
<select id="estado_civil"><option value="">Relacionamento</option><option>Casados</option><option>União estável</option><option>Namorados</option><option>Noivos</option><option>Solteiro</option><option>Divorciado</option><option>Viúvo</option></select>
<select id="tempo_juntos"><option value="">Tempo juntos</option><option>Menos de 1 ano</option><option>1 ano</option><option>2 anos</option><option>3 a 5 anos</option><option>6 a 10 anos</option><option>Mais de 10 anos</option></select>
</div>

<div class="grid">
<select id="veiculo"><option value="">Possui carro?</option><option>Sim</option><option>Não</option></select>
<select id="ano_veiculo"><option value="">Ano do carro</option></select>
</div>

<div class="grid">
<select id="marca_carro"><option value="">Marca do carro</option><option>Chevrolet</option><option>Fiat</option><option>Volkswagen</option><option>Toyota</option><option>Honda</option><option>Hyundai</option><option>Jeep</option><option>Renault</option><option>Nissan</option><option>Ford</option><option>BMW</option><option>Mercedes-Benz</option><option>Audi</option><option>Volvo</option><option>BYD</option><option>Caoa Chery</option><option>Peugeot</option><option>Citroën</option><option>Mitsubishi</option><option>Kia</option><option>Land Rover</option><option>Outro</option></select>
<input id="modelo_carro" placeholder="Modelo do carro">
</div>

<div class="grid">
<select id="cartao_credito"><option value="">Cartão de crédito?</option><option>Sim</option><option>Não</option></select>
<select id="casa_propria"><option value="">Casa própria?</option><option>Sim</option><option>Não</option></select>
</div>

<select id="renda_casal">
<option value="">Renda mensal</option><option>Até R$ 5.000</option><option>R$ 5.001 a R$ 8.000</option><option>R$ 8.001 a R$ 10.999</option><option>R$ 11.000 a R$ 14.999</option><option>R$ 15.000 ou mais</option>
</select>

<input id="contato" placeholder="Contato / WhatsApp">
<input id="familia_falou" placeholder="O que a família falou?">

<div class="grid">
<select id="multipropriedade"><option value="">Já conheceu multipropriedade?</option><option>Sim</option><option>Não</option></select>
<input id="onde_multipropriedade" placeholder="Onde conheceu?">
</div>

<textarea id="programacao_casal" placeholder="Programação do casal"></textarea>

<div class="grid">
<select id="possui_investimento_lazer"><option value="">Investimento em lazer?</option><option>Sim</option><option>Não</option></select>
<input id="investimento_lazer_onde" placeholder="Onde?">
</div>

<input id="brinde" placeholder="Brinde entregue">
<select id="levou_sala"><option value="">Levou em sala?</option><option>Sim</option><option>Não</option></select>
<textarea id="observacoes" placeholder="Observações"></textarea>

<button onclick="calcularQualificacao()">Calcular Q/NQ</button>
<div id="resultadoQualificacao"></div>

<button onclick="salvarPesquisa()">Salvar Pesquisa</button>
<p id="formMsg"></p>
</div>
</div>

<script>
const SUPABASE_URL="https://veznreiamwstlulkpocz.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlem5yZWlhbXdzdGx1bGtwb2N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2ODc1NDksImV4cCI6MjA5NzI2MzU0OX0.MeSqJZTZnk3zDKWgD920ccV2KUheH0W_BGD3TvhPXdM";
const db=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let usuarioEmail="",captadorNome="",latitude=null,longitude=null,qualificacao="NQ",motivoQualificacao="";

for(let i=18;i<=80;i++){addOpt("idade_1",i,i+" anos");addOpt("idade_2",i,i+" anos")}
for(let a=2026;a>=1995;a--) addOpt("ano_veiculo",a,a);

const profissoesBloqueadas=["Operador de caixa","Zelador","Secretária","Auxiliar","Assistente","Avon/Natura/Multinível","Gari","Vendedor ambulante","Motoboy","Do lar","Estoquista","Eletricista","Diarista","Doméstica","Garçom","Manicure","Pedreiro","Atendente","Balconista","Babá","Porteiro","Frentista","Estudante","Uber/App/Freelancer"];

async function entrar(){
 const email=campo("email").trim().toLowerCase(), nome=campo("captadorNome").trim();
 if(!email||!nome){msg("loginMsg","Preencha e-mail e nome.","erro");return}
 usuarioEmail=email;captadorNome=nome;
 const {data}=await db.from("approved_users").select("*").eq("email",email).maybeSingle();
 if(!data){await db.from("approved_users").insert({email,name:nome,approved:false});show("aguardandoBox");return}
 if(data.approved!==true){show("aguardandoBox");return}
 document.getElementById("loginBox").classList.add("hidden");document.getElementById("formBox").classList.remove("hidden");gps();
}

function calcularQualificacao(){
 let motivos=[], itensNQ=0;
 const idadeH=Number(campo("idade_1")), idadeM=Number(campo("idade_2")), ano=Number(campo("ano_veiculo"));
 const rendaOk=campo("renda_casal")==="R$ 15.000 ou mais";
 const carroOk=campo("veiculo")==="Sim" && ano>=2011;
 const casaOk=campo("casa_propria")==="Sim";
 const cartaoOk=campo("cartao_credito")==="Sim";
 const civil=campo("estado_civil"), tempo=campo("tempo_juntos");
 const profissaoBloqueada=profissoesBloqueadas.includes(campo("profissao_1"))||profissoesBloqueadas.includes(campo("profissao_2"));

 if(profissaoBloqueada) motivos.push("Profissão bloqueada pela tabela");
 if(idadeH<25) motivos.push("Homem abaixo de 25 desqualifica");
 if(idadeH>64||idadeM>64) motivos.push("Acima do limite de 64 anos");
 if(!rendaOk){motivos.push("Renda abaixo de R$ 15.000");itensNQ++}
 if(!carroOk){motivos.push("Carro ausente ou anterior a 2011");itensNQ++}
 if(!casaOk){motivos.push("Sem casa própria");itensNQ++}
 if(!cartaoOk){motivos.push("Sem cartão de crédito");itensNQ++}

 let relacionamentoOk=false;
 if(civil==="Casados") relacionamentoOk=true;
 if(civil==="União estável" && ["2 anos","3 a 5 anos","6 a 10 anos","Mais de 10 anos"].includes(tempo)) relacionamentoOk=true;
 if(!relacionamentoOk){motivos.push("Relacionamento fora da regra");itensNQ++}

 if(profissaoBloqueada || idadeH<25 || idadeH>64 || idadeM>64 || itensNQ>=2){
   qualificacao="NQ";
 }else if(itensNQ===1){
   qualificacao="NQ 1 ITEM / LÍDER DECIDE";
 }else{
   qualificacao="Q";
 }

 motivoQualificacao=motivos.length?motivos.join(" | "):"Perfil dentro da regra";
 const div=document.getElementById("resultadoQualificacao");
 div.className="resultado "+(qualificacao==="Q"?"q":qualificacao.includes("1 ITEM")?"item":"nq");
 div.innerHTML="<b>"+qualificacao+"</b><br><small>"+motivoQualificacao+"</small>";
 return qualificacao;
}

async function salvarPesquisa(){
 calcularQualificacao();
 const p={
 user_email:usuarioEmail,captador_nome:captadorNome,equipe:campo("equipe"),ponto_captacao:campo("ponto_captacao"),
 convidado_1:campo("convidado_1"),idade_1:num("idade_1"),profissao_1:campo("profissao_1"),
 convidado_2:campo("convidado_2"),idade_2:num("idade_2"),profissao_2:campo("profissao_2"),
 estado_civil:campo("estado_civil"),tempo_juntos:campo("tempo_juntos"),veiculo:campo("veiculo"),ano_veiculo:campo("ano_veiculo"),
 marca_carro:campo("marca_carro"),modelo_carro:campo("modelo_carro"),cartao_credito:campo("cartao_credito"),casa_propria:campo("casa_propria"),
 renda_casal:campo("renda_casal"),contato:campo("contato"),observacoes:campo("observacoes")+" | Família falou: "+campo("familia_falou"),
 multipropriedade:campo("multipropriedade"),onde_multipropriedade:campo("onde_multipropriedade"),programacao_casal:campo("programacao_casal"),
 possui_investimento_lazer:campo("possui_investimento_lazer"),investimento_lazer_onde:campo("investimento_lazer_onde"),
 brinde:campo("brinde"),levou_sala:campo("levou_sala"),status:qualificacao,qualificacao_automatica:qualificacao,motivo_qualificacao:motivoQualificacao,
 latitude,longitude,horario_local:new Date().getHours()+":00"
 };
 const {error}=await db.from("pesquisas").insert(p);
 if(error){console.log(error);msg("formMsg","Erro ao salvar. Falta coluna no Supabase.","erro");return}
 msg("formMsg","Pesquisa salva com sucesso!","ok");
}

function gps(){navigator.geolocation&&navigator.geolocation.getCurrentPosition(p=>{latitude=p.coords.latitude;longitude=p.coords.longitude},()=>alert("Permita localização."))}
function campo(id){return document.getElementById(id).value}
function num(id){return campo(id)?parseInt(campo(id)):null}
function addOpt(id,v,t){let o=document.createElement("option");o.value=v;o.textContent=t;document.getElementById(id).appendChild(o)}
function msg(id,t,c){document.getElementById(id).innerHTML=`<span class="${c}">${t}</span>`}
function show(id){document.getElementById("loginBox").classList.add("hidden");document.getElementById(id).classList.remove("hidden")}
</script>
</body>
</html>
