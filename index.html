<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CaptaPro 7.1 PRO</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(180deg, #050505, #180000);
  color: #e8e8e8;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.wrap { max-width: 1100px; margin: 0 auto; padding: 12px; }

/* ===== HEADER ===== */
.top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  padding: 16px 20px;
  background: linear-gradient(135deg, #0a0a0a, #1a0505);
  border-radius: 20px;
  border: 1px solid #2a1515;
  margin-bottom: 16px;
  gap: 10px;
}
.logo { font-size: 36px; font-weight: 900; letter-spacing: -1px; }
.logo span { color: #ef1b24; }
.logo small { font-size: 14px; font-weight: 400; color: #888; margin-left: 8px; }
.badge {
  display: inline-block;
  background: #1b0505;
  border: 1px solid #671818;
  color: #ff8585;
  border-radius: 999px;
  padding: 4px 14px;
  font-size: 11px;
  font-weight: 900;
}
.user-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.user-info .name { color: #00e676; font-weight: 700; font-size: 14px; }
.user-info .role {
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 999px;
  padding: 2px 12px;
  font-size: 11px;
  color: #aaa;
}
.btn-sair {
  background: #2a0a0a;
  border: 1px solid #5a1515;
  color: #ff6666;
  padding: 6px 16px;
  border-radius: 999px;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  transition: background .2s;
}
.btn-sair:hover { background: #3a0a0a; }

/* ===== CARDS ===== */
.card {
  background: linear-gradient(145deg, #0d0d0d, #0a0a0a);
  border: 1px solid #222;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: 0 4px 24px rgba(0,0,0,.4);
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  margin-bottom: 12px;
  gap: 8px;
}
.card-header h2 { font-size: 18px; border-left: 4px solid #ef1b24; padding-left: 12px; color: #fff; }
.card-header .count { font-size: 13px; color: #888; }
.section {
  background: #0a0a0a;
  border: 1px solid #1a1a1a;
  border-radius: 14px;
  padding: 14px;
  margin-top: 12px;
}
.section-title {
  font-size: 15px;
  color: #ff8585;
  font-weight: 700;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title .pill { font-size: 11px; font-weight: 400; color: #aaa; background: #151515; padding: 2px 10px; border-radius: 999px; }

/* ===== FORMULÁRIOS ===== */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 11px; color: #777; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; }
input, select, textarea {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid #2a2a2a;
  background: #0a0a0a;
  color: #e8e8e8;
  font-size: 14px;
  transition: border .2s, box-shadow .2s;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: #ef1b24;
  box-shadow: 0 0 0 3px rgba(239,27,36,.12);
}
textarea { min-height: 60px; resize: vertical; }
select option { background: #1a1a1a; }
input::placeholder, textarea::placeholder { color: #555; }

/* ===== BOTÕES ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  border: none;
  transition: all .2s;
  text-decoration: none;
  white-space: nowrap;
  position: relative;
  overflow: hidden;
}
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }
.btn-primary { background: linear-gradient(135deg, #ef1b24, #cc1520); color: #fff; box-shadow: 0 4px 16px rgba(239,27,36,.25); }
.btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(239,27,36,.35); }
.btn-secondary { background: #1a1a1a; color: #ccc; border: 1px solid #333; }
.btn-secondary:hover:not(:disabled) { background: #252525; border-color: #555; }
.btn-success { background: linear-gradient(135deg, #00a651, #00c853); color: #fff; box-shadow: 0 4px 16px rgba(0,200,83,.2); }
.btn-success:hover:not(:disabled) { transform: translateY(-2px); }
.btn-danger { background: linear-gradient(135deg, #a62020, #cc1520); color: #fff; }
.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn-xs { padding: 4px 10px; font-size: 11px; }
.btn-block { width: 100%; }

/* Spinner no botão */
.btn.loading::after {
  content: '';
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  margin-left: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== TABS ===== */
.tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.tabs button {
  background: #0f0f0f;
  border: 1px solid #222;
  padding: 10px 18px;
  border-radius: 12px;
  color: #aaa;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  transition: all .2s;
  flex: 1;
  min-width: 100px;
  text-align: center;
}
.tabs button:hover { background: #181818; color: #fff; }
.tabs button.active {
  background: linear-gradient(135deg, #ef1b24, #cc1520);
  color: #fff;
  border-color: #ef1b24;
  box-shadow: 0 4px 16px rgba(239,27,36,.2);
}
.tabs button .tab-icon { font-size: 16px; display: block; margin-bottom: 2px; }

/* ===== PAINÉIS DE NÚMEROS ===== */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin: 10px 0; }
.stat-card {
  background: #111;
  border: 1px solid #222;
  border-radius: 12px;
  padding: 12px;
  text-align: center;
  min-height: 70px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  transition: transform .2s, border-color .2s;
}
.stat-card:hover { transform: translateY(-2px); border-color: #333; }
.stat-card .label { font-size: 10px; text-transform: uppercase; color: #777; font-weight: 700; letter-spacing: .4px; }
.stat-card .value { font-size: 26px; font-weight: 900; color: #ef1b24; margin-top: 2px; }
.stat-card .value.green { color: #00e676; }
.stat-card .value.blue { color: #00c2ff; }
.stat-card .value.gold { color: #ffd54f; }
.stat-card .value.white { color: #fff; }
.stat-card.small .value { font-size: 20px; }

/* ===== RANKING TABELAS ===== */
.table-wrap { overflow-x: auto; margin-top: 8px; }
.table { width: 100%; border-collapse: collapse; font-size: 13px; }
.table th { color: #ff7777; text-transform: uppercase; font-size: 11px; padding: 10px 8px; text-align: left; border-bottom: 2px solid #1a1a1a; }
.table td { padding: 9px 8px; border-bottom: 1px solid #181818; }
.table .pos { color: #ffd54f; font-weight: 900; width: 40px; }
.table .money { color: #00e676; font-weight: 700; }
.table .green { color: #00e676; font-weight: 700; }
.table .blue { color: #00c2ff; font-weight: 700; }
.table .gold { color: #ffd54f; font-weight: 700; }
.table tr.top1 { background: linear-gradient(90deg, rgba(255,213,79,.08), transparent); }
.table tr.top2 { background: linear-gradient(90deg, rgba(207,216,220,.06), transparent); }
.table tr.top3 { background: linear-gradient(90deg, rgba(215,163,106,.06), transparent); }
.table tr:hover { background: rgba(255,255,255,.03); }

/* ===== FICHAS ===== */
.ficha-card {
  background: #0a0a0a;
  border: 1px solid #1a1a1a;
  border-radius: 12px;
  padding: 12px;
  margin: 6px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  transition: border-color .2s;
}
.ficha-card:hover { border-color: #333; }
.ficha-card.sala { border-color: #00e676; background: linear-gradient(145deg, #0a1a0a, #0a0a0a); }
.ficha-card .info { flex: 1; min-width: 200px; }
.ficha-card .info b { color: #fff; font-size: 15px; }
.ficha-card .info small { display: block; color: #888; font-size: 12px; margin-top: 2px; }
.ficha-card .tags { display: flex; gap: 4px; flex-wrap: wrap; }
.tag { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 10px; font-weight: 900; background: #151515; border: 1px solid #2a2a2a; color: #aaa; }
.tag.q { border-color: #00e676; color: #00e676; }
.tag.nq { border-color: #ffd54f; color: #ffd54f; }
.tag.sala { border-color: #00c2ff; color: #00c2ff; }
.tag.venda { border-color: #ff6b35; color: #ff6b35; }

/* ===== PILLS ===== */
.pill { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight: 700; background: #151515; border: 1px solid #2a2a2a; color: #aaa; }
.pill.green { background: #0a2a0a; border-color: #00e676; color: #00e676; }
.pill.blue { background: #0a1a2a; border-color: #00c2ff; color: #00c2ff; }
.pill.gold { background: #2a2a0a; border-color: #ffd54f; color: #ffd54f; }
.pill.red { background: #2a0a0a; border-color: #ff5252; color: #ff5252; }

/* ===== EMPTY STATE ===== */
.empty { text-align: center; padding: 30px 20px; color: #666; font-size: 13px; border: 1px dashed #222; border-radius: 12px; }
.empty .icon { font-size: 32px; display: block; margin-bottom: 8px; }

/* ===== BARRA DE PROGRESSO ===== */
.progress-bar { height: 6px; background: #1a1a1a; border-radius: 999px; overflow: hidden; margin: 8px 0; }
.progress-bar .fill { height: 100%; background: linear-gradient(90deg, #00a651, #00e676); border-radius: 999px; transition: width .4s; }

/* ===== MAPA ===== */
#mapaCEO60, #mapaCEO71 {
  width: 100% !important;
  height: 520px !important;
  min-height: 520px !important;
  background: #07110c !important;
  border: 2px solid #00c2ff !important;
  border-radius: 16px !important;
  overflow: hidden !important;
}
.map-notice { background: #0a1a1a; border: 1px solid #00e676; border-radius: 12px; padding: 10px 14px; color: #00e676; font-size: 12px; font-weight: 700; margin: 8px 0; }

/* ===== MODAL ===== */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(4px); }
.modal.hidden { display: none !important; }
.modal-box {
  background: #0d0d0d;
  border: 1px solid #3a1515;
  border-radius: 20px;
  padding: 20px;
  max-width: 600px;
  width: 100%;
  max-height: 90vh;
  overflow: auto;
  animation: modalIn .2s ease;
}
@keyframes modalIn { from { transform: scale(.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-box h3 { color: #fff; margin-bottom: 12px; }

/* ===== TOOLS ===== */
.tools { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
.tools .btn { flex: 0 1 auto; }
.tools .btn-block { flex: 1; }
.tools input, .tools select { flex: 1; min-width: 120px; }

/* ===== TOAST NOTIFICATION ===== */
#toastContainer {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 99999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 12px;
  padding: 12px 18px;
  font-size: 13px;
  font-weight: 600;
  color: #e8e8e8;
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
  animation: toastIn .3s ease;
  pointer-events: auto;
  max-width: 320px;
}
.toast.success { border-color: #00e676; color: #00e676; background: #0a1a0a; }
.toast.error { border-color: #ff5252; color: #ff5252; background: #1a0a0a; }
.toast.info { border-color: #00c2ff; color: #00c2ff; background: #0a1a2a; }
@keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes toastOut { to { transform: translateX(120%); opacity: 0; } }

/* ===== HIDDEN ===== */
.hidden { display: none !important; }

/* ===== ABORDAGEM COUNTER PULSE ===== */
#abordagensHoje {
  display: inline-block;
  transition: transform .15s;
}
#abordagensHoje.pulse {
  animation: counterPulse .3s ease;
}
@keyframes counterPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.4); }
  100% { transform: scale(1); }
}

/* ===== FICHA ANTIGA ESTILO ===== */
.ficha-antiga-card61 {
  background: linear-gradient(145deg, #070707, #190000);
  border: 2px solid #5a1717;
  border-radius: 22px;
  padding: 20px;
  color: #fff;
  box-shadow: 0 0 28px rgba(239,27,36,.18);
}
.ficha-antiga-head61 {
  display: flex;
  gap: 14px;
  align-items: center;
  border-bottom: 1px solid #3b1b1b;
  padding-bottom: 14px;
  margin-bottom: 14px;
}
.ficha-antiga-logo61 {
  width: 58px;
  height: 58px;
  border-radius: 16px;
  background: linear-gradient(135deg, #ef1b24, #7a0000);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 22px;
}
.ficha-antiga-title61 b { display: block; font-size: 24px; line-height: 1; }
.ficha-antiga-title61 small { color: #aaa; }
.ficha-antiga-result61 {
  background: #101010;
  border: 1px solid #333;
  border-radius: 16px;
  padding: 12px;
  margin-bottom: 12px;
}
.ficha-antiga-result61 small, .ficha-antiga-campo61 small {
  display: block;
  color: #ff8585;
  font-size: 10px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: .4px;
  margin-bottom: 4px;
}
.ficha-antiga-result61 b { font-size: 22px; color: #00e676; }
.ficha-antiga-grid61 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.ficha-antiga-campo61 {
  background: #0d0d0d;
  border: 1px solid #2a2a2a;
  border-radius: 14px;
  padding: 11px;
}
.ficha-antiga-campo61 b {
  display: block;
  font-size: 15px;
  color: #fff;
  word-break: break-word;
}
.ficha-antiga-campo61.full { grid-column: 1/-1; }
.ficha-antiga-foot61 {
  border-top: 1px solid #3b1b1b;
  margin-top: 14px;
  padding-top: 10px;
  color: #aaa;
  font-size: 12px;
}
.fichaShare61 {
  width: 1280px;
  max-width: 1280px;
  background: linear-gradient(180deg, #070707, #160000);
  border: 5px solid #5a1717;
  border-radius: 44px;
  padding: 56px;
  color: #fff;
  font-family: Arial, sans-serif;
}
.fichaShare61 .ficha-antiga-logo61 { width: 120px; height: 120px; font-size: 46px; border-radius: 28px; }
.fichaShare61 .ficha-antiga-title61 b { font-size: 64px; }
.fichaShare61 .ficha-antiga-title61 small { font-size: 28px; }
.fichaShare61 .ficha-antiga-result61 { display: none; }
.fichaShare61 .ficha-antiga-campo61 { padding: 28px; min-height: 132px; border-radius: 24px; border-width: 2px; }
.fichaShare61 .ficha-antiga-campo61 small { font-size: 22px; margin-bottom: 10px; }
.fichaShare61 .ficha-antiga-campo61 b { font-size: 38px; }
.fichaShare61 .ficha-antiga-foot61 { font-size: 26px; border-top-width: 2px; margin-top: 26px; padding-top: 22px; }
.resultadoProf61 {
  background: linear-gradient(135deg, #5f4600, #ffb300) !important;
  color: #111 !important;
  border-color: #ffd54f !important;
}
.resultadoProf61 .label, .resultadoProf61 .value, .resultadoProf61 small { color: #111 !important; }
.markerPonto61, .markerPonto70, .markerPonto71 {
  background: #00c2ff;
  color: #001;
  border: 3px solid #fff;
  border-radius: 999px;
  padding: 6px 10px;
  font-weight: 900;
  font-size: 12px;
  box-shadow: 0 0 18px #00c2ff;
  white-space: nowrap;
}
.markerProf61, .markerProf70, .markerProf71 {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 4px solid #fff;
  background: #00e676;
  box-shadow: 0 0 0 8px rgba(0,230,118,.22), 0 0 18px #00e676;
}

/* ===== CEO ===== */
.ceoGrid70 {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin: 10px 0;
}
.ceoCard70 {
  background: #111;
  border: 1px solid #222;
  border-radius: 14px;
  padding: 14px;
  text-align: center;
}
.ceoCard70 small {
  display: block;
  color: #777;
  text-transform: uppercase;
  font-size: 10px;
  font-weight: 900;
}
.ceoCard70 b { display: block; font-size: 24px; color: #00e676; margin-top: 3px; }
.metaAdm70 {
  background: #0a0a0a;
  border: 1px solid #333;
  border-radius: 14px;
  padding: 12px;
  margin: 8px 0;
}
.metaLinha70 {
  display: grid;
  grid-template-columns: 1.5fr .7fr .7fr;
  gap: 8px;
  align-items: center;
  border-bottom: 1px solid #1b1b1b;
  padding: 8px 0;
}
.metaLinha70:last-child { border-bottom: 0; }
.metaLinha70 b { color: #fff; }
.metaBar70 {
  height: 8px;
  background: #1a1a1a;
  border-radius: 999px;
  overflow: hidden;
  margin-top: 5px;
}
.metaFill70 {
  height: 100%;
  background: linear-gradient(90deg, #00a651, #00e676);
}
.arenaAposta70 {
  background: #0a0a0a;
  border: 1px solid #333;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 12px;
}
.fichaMini70, .fichaMini71 { margin-top: 8px; }
.fichaMini70 .ficha-antiga-card61, .fichaMini71 .ficha-antiga-card61 {
  padding: 12px;
  border-radius: 14px;
}
.fichaMini70 .ficha-antiga-head61, .fichaMini71 .ficha-antiga-head61 { display: none; }
.fichaMini70 .ficha-antiga-foot61, .fichaMini71 .ficha-antiga-foot61 { display: none; }
.fichaMini70 .ficha-antiga-grid61, .fichaMini71 .ficha-antiga-grid61 {
  grid-template-columns: 1fr 1fr;
}
.resultadoTools70 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin: 10px 0;
}
.resultadoTools70 select { min-height: 42px; }
.meuClean71 .section { margin-top: 14px; }
.fichaLista71 {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}
.ceoOnly71 {
  border: 1px solid #333;
  border-radius: 16px;
  padding: 14px;
  background: #0c0c0c;
  margin-top: 14px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .grid-2, .grid-3, .grid-4, .resultadoTools70 { grid-template-columns: 1fr; }
  .top { flex-direction: column; gap: 10px; text-align: center; }
  .tabs button { flex: 1 1 auto; min-width: 80px; font-size: 12px; padding: 8px 12px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .stat-card .value { font-size: 20px; }
  .ficha-card { flex-direction: column; align-items: stretch; }
  .tools { flex-direction: column; }
  .tools input, .tools select { flex: 1; min-width: auto; }
  #mapaCEO60, #mapaCEO71 { height: 350px !important; min-height: 350px !important; }
  .table { font-size: 12px; }
  .table td, .table th { padding: 6px 4px; }
  .fichaMini70 .ficha-antiga-grid61, .fichaMini71 .ficha-antiga-grid61 { grid-template-columns: 1fr; }
  .metaLinha70 { grid-template-columns: 1fr; }
  .ceoGrid70 { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 480px) {
