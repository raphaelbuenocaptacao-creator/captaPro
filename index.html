<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CaptaPro Simples 1.0</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#050505,#180000);color:#fff}.wrap{max-width:900px;margin:auto;padding:12px}
.top{text-align:center;margin:12px 0}.logo{font-size:38px;font-weight:900}.logo span{color:#ff3333}.version{display:inline-block;background:#1b0505;border:1px solid #671818;color:#ff8585;border-radius:999px;padding:5px 13px;font-size:12px;font-weight:900}
.card{background:#101010;border:1px solid #2b2b2b;border-radius:18px;padding:15px;margin-bottom:12px;box-shadow:0 0 16px rgba(239,27,36,.10)}h2{margin:0 0 12px;border-left:4px solid #ef1b24;padding-left:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}input,select,textarea,button{width:100%;padding:12px;border-radius:12px;border:1px solid #333;background:#050505;color:#fff;font-size:15px}textarea{min-height:70px}
button{font-weight:900;cursor:pointer}.main{background:linear-gradient(135deg,#ef1b24,#ff3333);border:0}.secondary{background:#202020;border:1px solid #444}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}.tabs button{background:#181818;border:0;padding:14px;border-radius:14px;color:#fff;font-weight:900}.tabs button.active{background:linear-gradient(135deg,#ef1b24,#ff3333)}
.hidden{display:none!important}.adminOnly{display:none}body.ceo .adminOnly{display:block}body.ceo .tabs{grid-template-columns:1fr 1fr 1fr}.ok{color:#00e676;font-weight:900}.erro{color:#ff5252;font-weight:900}.warn{color:#ffd54f;font-weight:900}.hint,.mini{color:#aaa;font-size:12px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}.kpi{background:#181818;border:1px solid #2d2d2d;border-radius:14px;padding:12px;text-align:center;color:#ccc}.kpi b{display:block;color:#ff3333;font-size:26px;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid #2b2b2b;padding:8px;text-align:left}th{color:#ff7777}.scroll{overflow:auto}.badge{display:inline-block;border-radius:999px;padding:6px 10px;background:#260000;border:1px solid #5b1111;color:#ff8585;font-weight:900}
.ficha{background:linear-gradient(145deg,#090909,#180000);border:1px solid #5a1717;border-radius:18px;padding:18px}.campo{background:#101010;border:1px solid #292929;border-radius:12px;padding:10px;margin:6px 0}.campo small{display:block;color:#ff7777;text-transform:uppercase;font-weight:900;font-size:10px;margin-bottom:4px}
@media(max-width:700px){.grid,.kpis{grid-template-columns:1fr}input,select,textarea,button{font-size:14px;padding:11px}.logo{font-size:32px}}
</style>
</head>
<body>
<div class="wrap">
<div class="top"><div class="logo">Capta<span>Pro</span></div><div class="version">Simples 1.0</div><p class="mini">Pesquisa e Relatório • CEO altera qualificação</p></div>

<section id="loginBox" class="card">
<h2>Entrada</h2><div class="grid"><input id="email" type="email" placeholder="Seu e-mail"><input id="nome" placeholder="Seu nome completo"></div><button class="main" style="margin-top:8px" onclick="entrar()">Entrar</button><p id="loginMsg"></p>
</section>

<section id="app" class="hidden">
<div class="tabs"><button class="active" onclick="aba('pesquisa',this)">Pesquisa</button><button onclick="aba('relatorio',this)">Relatório</button><button class="adminOnly" onclick="aba('qualificacao',this)">Qualificação CEO</button></div>

<section id="pesquisa" class="card">
<h2>Pesquisa</h2><p class="hint">Abordagem → ficha → salvar → compartilhar → nova ficha.</p>
<div class="card"><button class="main" style="min-height:62px;font-size:18px" onclick="registrarAbordagem()">+ REGISTRAR ABORDAGEM</button><p class="mini">Abordagens hoje: <b id="abordagensHoje" class="ok">0</b></p></div>
<div class="grid">
<select id="equipe"><option value="">Equipe</option><option>PARK</option><option>EXTERNA</option></select>
<select id="ponto"><option value="">Ponto</option><option>Porta dentro do Park</option><option>Park Dream House</option><option>Fábrica Spinassi</option><option>Corredor</option><option>Baden Baden</option><option>Djalma</option><option>Igreja</option><option>Renner</option><option>Guarda-chuvas</option><option>Posto Shell</option></select>
<input id="nome1" placeholder="Nome 1"><select id="idade1"><option value="">Idade 1</option></select><input id="profissao1" list="profissoes" placeholder="Profissão 1">
<input id="nome2" placeholder="Nome 2"><select id="idade2"><option value="">Idade 2</option></select><input id="profissao2" list="profissoes" placeholder="Profissão 2">
<select id="estado"><option value="">Estado</option><option>SP</option><option>RJ</option><option>MG</option><option>PR</option><option>SC</option><option>RS</option><option>GO</option><option>DF</option><option>BA</option></select><input id="cidade" list="cidades" placeholder="Cidade">
<select id="relacionamento"><option value="">Relacionamento</option><option>Casados</option><option>União estável</option><option>Namorados</option><option>Noivos</option><option>Solteiro</option></select>
<select id="tempo"><option value="">Tempo juntos</option><option>Menos de 1 ano</option><option>1 ano</option><option>2 anos</option><option>3 a 5 anos</option><option>Mais de 5 anos</option></select>
<select id="carro"><option value="">Possui carro?</option><option>Sim</option><option>Não</option></select><input id="marca" list="marcas" placeholder="Marca"><input id="modelo" placeholder="Modelo"><select id="ano"><option value="">Ano</option></select>
<select id="cartao"><option value="">Cartão?</option><option>Sim</option><option>Não</option></select><select id="casa"><option value="">Casa própria?</option><option>Sim</option><option>Não</option></select><select id="multi"><option value="">Já conheceu multipropriedade?</option><option>Sim</option><option>Não</option></select>
<input id="renda" inputmode="numeric" placeholder="Renda mensal"><select id="brinde"><option value="">Brinde</option><option>Voucher</option><option>Almoço</option><option>Passeio</option><option>Desconto</option></select><input id="contato" placeholder="WhatsApp / contato">
</div>
<textarea id="obs" style="margin-top:8px" placeholder="Observações"></textarea>
<div class="grid" style="margin-top:8px"><button class="secondary" onclick="calcularQualificacao()">Calcular Q/NQ</button><button class="main" onclick="salvarPesquisa()">Salvar Pesquisa</button></div><p id="formMsg"></p><div id="resultado"></div>
<div id="fichaBox" class="card hidden"><h2>Ficha salva</h2><div id="fichaConteudo"></div><div class="grid"><button class="main" onclick="compartilharFicha()">Compartilhar imagem</button><button class="secondary" onclick="novaPesquisa()">Nova pesquisa</button></div></div>
</section>

<section id="relatorio" class="card hidden"><h2>Relatório</h2><div class="grid"><input id="relDe" type="date"><input id="relAte" type="date"></div><button class="main" style="margin-top:8px" onclick="carregarRelatorio()">Atualizar</button>
<div class="kpis"><div class="kpi">Abordagens<b id="rAbord">0</b></div><div class="kpi">Pesquisas<b id="rPesq">0</b></div><div class="kpi">Sala<b id="rSala">0</b></div><div class="kpi">Conversão<b id="rConv">0%</b></div></div>
<div class="card scroll"><h2>Ranking</h2><div id="rankingBox"></div></div><div class="card"><h2>Individual</h2><select id="profFiltro" onchange="mostrarIndividual()"><option value="">Escolha o profissional</option></select><div id="individualBox"></div></div>
</section>

<section id="qualificacao" class="card hidden adminOnly"><h2>Qualificação CEO</h2><div class="grid"><input id="cfgIdadeMin" type="number" placeholder="Idade mínima"><input id="cfgRendaMin" type="number" placeholder="Renda mínima"><select id="cfgCarro"><option value="nao">Carro não obrigatório</option><option value="sim">Carro obrigatório</option></select><select id="cfgCartao"><option value="nao">Cartão não obrigatório</option><option value="sim">Cartão obrigatório</option></select></div><button class="main" style="margin-top:8px" onclick="salvarConfig()">Salvar regras</button><p id="cfgMsg"></p></section>
</section></div>

<datalist id="profissoes"><option value="Outro(a)"><option value="Empresário"><option value="Empresária"><option value="Comerciante"><option value="Vendedor"><option value="Gerente"><option value="Professor"><option value="Médico"><option value="Advogado"><option value="Engenheiro"><option value="Autônomo"><option value="Aposentado"></datalist>
<datalist id="cidades"><option value="Campos do Jordão"><option value="São Paulo"><option value="São José dos Campos"><option value="Taubaté"><option value="Pindamonhangaba"><option value="Campinas"><option value="Rio de Janeiro"></datalist>
<datalist id="marcas"><option value="Chevrolet"><option value="Fiat"><option value="Ford"><option value="Honda"><option value="Hyundai"><option value="Jeep"><option value="Nissan"><option value="Renault"><option value="Toyota"><option value="Volkswagen"></datalist>

<script>
const SUPABASE_URL="https://veznreiamwstlulkpocz.supabase.co", SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlem5yZWlhbXdzdGx1bGtwb2N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2ODc1NDksImV4cCI6MjA5NzI2MzU0OX0.MeSqJZTZnk3zDKWgD920ccV2KUheH0W_BGD3TvhPXdM";
const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const CEOS=['raphaelbueno.captacao@gmail.com','marcel.dorado2@gmail.com'];let usuarioEmail='',usuarioNome='',role='profissional',ultimaFicha=null;
function E(id){return document.getElementById(id)}function V(id){return (E(id)?.value||'').trim()}function H(id,v){E(id).innerHTML=v}function S(id,v){E(id).innerText=v}
for(let i=18;i<=90;i++){E('idade1').innerHTML+=`<option>${i}</option>`;E('idade2').innerHTML+=`<option>${i}</option>`}for(let a=new Date().getFullYear()+1;a>=1980;a--)E('ano').innerHTML+=`<option>${a}</option>`;
function getCfg(){return JSON.parse(localStorage.getItem('cfg')||'{"idadeMin":30,"rendaMin":12000,"carro":"nao","cartao":"nao"}')}
function loadCfg(){let c=getCfg();E('cfgIdadeMin').value=c.idadeMin;E('cfgRendaMin').value=c.rendaMin;E('cfgCarro').value=c.carro;E('cfgCartao').value=c.cartao}
async function entrar(){usuarioEmail=V('email').toLowerCase();usuarioNome=V('nome')||usuarioEmail;if(!usuarioEmail){H('loginMsg','<span class=erro>Informe o e-mail.</span>');return}try{let r=await db.from('approved_users').select('*').eq('email',usuarioEmail).maybeSingle();let u=r.data;if(!u&&CEOS.includes(usuarioEmail))u={role:'ceo',approved:true,name:usuarioNome};if(!u||u.approved===false){H('loginMsg','<span class=erro>E-mail não aprovado.</span>');return}role=u.role||'profissional';usuarioNome=u.name||usuarioNome}catch(e){role=CEOS.includes(usuarioEmail)?'ceo':'profissional'}document.body.classList.toggle('ceo',role==='ceo'||CEOS.includes(usuarioEmail));E('loginBox').classList.add('hidden');E('app').classList.remove('hidden');localStorage.setItem('loginSimples',JSON.stringify({email:usuarioEmail,nome:usuarioNome}));loadCfg();carregarAbordagensHoje();carregarRelatorio()}
(function(){try{let l=JSON.parse(localStorage.getItem('loginSimples')||'null');if(l){E('email').value=l.email;E('nome').value=l.nome;setTimeout(entrar,300)}}catch(e){}})();
function aba(id,b){['pesquisa','relatorio','qualificacao'].forEach(x=>E(x).classList.add('hidden'));E(id).classList.remove('hidden');document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');if(id==='relatorio')carregarRelatorio()}
function salvarConfig(){let c={idadeMin:+V('cfgIdadeMin')||30,rendaMin:+V('cfgRendaMin')||12000,carro:V('cfgCarro'),cartao:V('cfgCartao')};localStorage.setItem('cfg',JSON.stringify(c));H('cfgMsg','<span class=ok>Regras salvas.</span>')}
function qual(){let c=getCfg(),idade=Math.max(+V('idade1')||0,+V('idade2')||0),renda=+String(V('renda')).replace(/[^0-9]/g,'')||0,status='Q',m=[];if(idade<c.idadeMin){status='NQ';m.push('idade')}if(renda<c.rendaMin){status=status==='Q'?'NQ 1 Item':status;m.push('renda')}if(c.carro==='sim'&&V('carro')!=='Sim'){status=status==='Q'?'NQ 1 Item':status;m.push('carro')}if(c.cartao==='sim'&&V('cartao')!=='Sim'){status=status==='Q'?'NQ 1 Item':status;m.push('cartão')}return {status,motivo:m.join(', ')||'Perfil dentro da regra'}}
function calcularQualificacao(){let q=qual();H('resultado',`<div class=card><span class=badge>${q.status}</span><p class=mini>${q.motivo}</p></div>`);return q}
async function registrarAbordagem(){let p={user_email:usuarioEmail,captador_nome:usuarioNome,equipe:V('equipe'),ponto_captacao:V('ponto'),observacao:'Abordagem',created_at:new Date().toISOString()};try{await db.from('abordagens').insert(p)}catch(e){let a=JSON.parse(localStorage.getItem('abordagensLocal')||'[]');a.push(p);localStorage.setItem('abordagensLocal',JSON.stringify(a))}carregarAbordagensHoje();H('formMsg','<span class=ok>Abordagem registrada.</span>')}
async function carregarAbordagensHoje(){let total=0,d=new Date().toISOString().slice(0,10);try{let r=await db.from('abordagens').select('*',{count:'exact',head:true}).eq('user_email',usuarioEmail).gte('created_at',d+'T00:00:00').lte('created_at',d+'T23:59:59');total=r.count||0}catch(e){total=JSON.parse(localStorage.getItem('abordagensLocal')||'[]').filter(x=>x.user_email===usuarioEmail&&x.created_at.slice(0,10)===d).length}S('abordagensHoje',total)}
function payload(){let q=calcularQualificacao();return {user_email:usuarioEmail,captador_nome:usuarioNome,equipe:V('equipe'),ponto_captacao:V('ponto'),convidado_1:V('nome1'),convidado_2:V('nome2'),idade_1:+V('idade1')||0,idade_2:+V('idade2')||0,profissao_1:V('profissao1'),profissao_2:V('profissao2'),estado_origem:V('estado'),cidade_origem:V('cidade'),estado_civil:V('relacionamento'),tempo_juntos:V('tempo'),veiculo:V('carro'),marca_carro:V('marca'),modelo_carro:V('modelo'),ano_veiculo:V('ano'),cartao_credito:V('cartao'),casa_propria:V('casa'),multipropriedade:V('multi'),renda_casal:V('renda'),brinde:V('brinde'),contato:V('contato'),observacoes:V('obs'),qualificacao_automatica:q.status,motivo_qualificacao:q.motivo,levou_sala:'Não',created_at:new Date().toISOString()}}
async function salvarPesquisa(){let p=payload();if(!p.convidado_1){H('formMsg','<span class=erro>Informe o Nome 1.</span>');return}try{await db.from('pesquisas').insert(p);H('formMsg','<span class=ok>Ficha salva.</span>')}catch(e){let a=JSON.parse(localStorage.getItem('pesquisasLocal')||'[]');a.push(p);localStorage.setItem('pesquisasLocal',JSON.stringify(a));H('formMsg','<span class=warn>Ficha salva localmente.</span>')}ultimaFicha=p;renderFicha(p);carregarRelatorio()}
function renderFicha(p){E('fichaBox').classList.remove('hidden');H('fichaConteudo',`<div id=fichaImg class=ficha><h2>Ficha CaptaPro</h2><p><span class=badge>${p.qualificacao_automatica}</span></p><div class=campo><small>Casal</small>${p.convidado_1} / ${p.convidado_2||'-'}</div><div class=campo><small>Cidade</small>${p.cidade_origem||'-'} - ${p.estado_origem||'-'}</div><div class=campo><small>Renda</small>${p.renda_casal||'-'}</div><div class=campo><small>Carro</small>${p.marca_carro||'-'} ${p.modelo_carro||''} ${p.ano_veiculo||''}</div><div class=campo><small>Captador</small>${p.captador_nome} • ${p.ponto_captacao||'-'}</div></div>`)}
async function compartilharFicha(){let node=E('fichaImg');if(!node)return;let c=await html2canvas(node,{scale:2,backgroundColor:'#090909'});c.toBlob(async b=>{let f=new File([b],'ficha-captapro.png',{type:'image/png'});if(navigator.canShare&&navigator.canShare({files:[f]}))await navigator.share({files:[f],title:'Ficha CaptaPro'});else{let a=document.createElement('a');a.href=c.toDataURL();a.download='ficha-captapro.png';a.click()}})}
function novaPesquisa(){['nome1','nome2','idade1','idade2','profissao1','profissao2','estado','cidade','relacionamento','tempo','carro','marca','modelo','ano','cartao','casa','multi','renda','brinde','contato','obs'].forEach(id=>E(id).value='');H('resultado','');H('formMsg','');E('fichaBox').classList.add('hidden');E('nome1').focus()}
async function dados(t){try{let r=await db.from(t).select('*').order('created_at',{ascending:false}).limit(1000);return r.data||[]}catch(e){return JSON.parse(localStorage.getItem(t==='pesquisas'?'pesquisasLocal':'abordagensLocal')||'[]')}}
function per(x,de,ate){let d=(x.created_at||'').slice(0,10);return(!de||d>=de)&&(!ate||d<=ate)}
async function carregarRelatorio(){let de=V('relDe'),ate=V('relAte'),p=await dados('pesquisas'),a=await dados('abordagens');if(role!=='ceo'){p=p.filter(x=>x.user_email===usuarioEmail);a=a.filter(x=>x.user_email===usuarioEmail)}p=p.filter(x=>per(x,de,ate));a=a.filter(x=>per(x,de,ate));let sala=p.filter(x=>String(x.levou_sala||'').toLowerCase().includes('sim')).length;S('rAbord',a.length);S('rPesq',p.length);S('rSala',sala);S('rConv',p.length?Math.round(sala/p.length*100)+'%':'0%');let m={};p.forEach(x=>{let n=x.captador_nome||x.user_email;if(!m[n])m[n]={nome:n,p:0,s:0,q:0,nq:0,a:0};m[n].p++;if(x.qualificacao_automatica==='Q')m[n].q++;else m[n].nq++;if(String(x.levou_sala||'').toLowerCase().includes('sim'))m[n].s++});a.forEach(x=>{let n=x.captador_nome||x.user_email;if(!m[n])m[n]={nome:n,p:0,s:0,q:0,nq:0,a:0};m[n].a++});let rows=Object.values(m).sort((x,y)=>y.p-x.p||y.s-x.s);H('rankingBox',rows.length?'<table><tr><th>Nome</th><th>Abord.</th><th>Pesq.</th><th>Q</th><th>NQ</th><th>Sala</th></tr>'+rows.map(r=>`<tr><td>${r.nome}</td><td>${r.a}</td><td>${r.p}</td><td>${r.q}</td><td>${r.nq}</td><td>${r.s}</td></tr>`).join('')+'</table>':'<p class=mini>Sem dados.</p>');H('profFiltro','<option value="">Escolha o profissional</option>'+rows.map(r=>`<option>${r.nome}</option>`).join(''));window.rowsRel=rows;mostrarIndividual()}
function mostrarIndividual(){let r=(window.rowsRel||[]).find(x=>x.nome===V('profFiltro'));H('individualBox',r?`<div class=kpis><div class=kpi>Abord.<b>${r.a}</b></div><div class=kpi>Pesq.<b>${r.p}</b></div><div class=kpi>Q<b>${r.q}</b></div><div class=kpi>Sala<b>${r.s}</b></div></div>`:'<p class=mini>Escolha um profissional.</p>')}
</script>
</body></html>
