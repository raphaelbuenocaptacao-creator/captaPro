<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>CaptaPro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#050505;color:#fff}
    .container{max-width:560px;margin:auto;padding:18px}
    .card{background:#111;border:1px solid #222;border-radius:18px;padding:18px;margin-top:16px}
    h1{text-align:center;margin-bottom:5px}
    .sub{text-align:center;color:#aaa;margin-bottom:18px}
    input,select,textarea,button{width:100%;box-sizing:border-box;margin-top:10px;padding:14px;border-radius:12px;border:1px solid #333;background:#050505;color:white;font-size:15px}
    textarea{min-height:90px}
    button{background:#00e676;color:#000;font-weight:bold;border:none}
    .hidden{display:none}
    .ok{color:#00e676;font-weight:bold;text-align:center}
    .erro{color:#ff5252;font-weight:bold;text-align:center}
    .info{color:#bbb;font-size:13px;text-align:center}
  </style>
</head>

<body>
<div class="container">
  <h1>CaptaPro</h1>
  <div class="sub">Pesquisa Inteligente de Captação</div>

  <div id="loginBox" class="card">
    <h2>Entrada</h2>
    <p class="info">Digite seu e-mail. O gestor precisa aprovar seu acesso.</p>
    <input id="email" type="email" placeholder="Seu e-mail">
    <input id="captadorNome" type="text" placeholder="Seu nome">
    <button onclick="entrar()">Entrar</button>
    <p id="loginMsg"></p>
  </div>

  <div id="aguardandoBox" class="card hidden">
    <h2>Aguardando aprovação</h2>
    <p class="erro">Seu e-mail ainda não foi aprovado pelo gestor.</p>
  </div>

  <div id="formBox" class="card hidden">
    <h2>Nova Pesquisa</h2>

    <input id="convidado_1" placeholder="Nome do senhor">
    <input id="idade_1" type="number" placeholder="Idade do senhor">
    <input id="profissao_1" placeholder="Profissão do senhor">

    <input id="convidado_2" placeholder="Nome da senhora">
    <input id="idade_2" type="number" placeholder="Idade da senhora">
    <input id="profissao_2" placeholder="Profissão da senhora">

    <input id="veiculo" placeholder="Veículo">
    <input id="ano_veiculo" placeholder="Ano do veículo">
    <input id="outro_veiculo" placeholder="Outro veículo">

    <select id="estado_civil">
      <option value="">Estado civil</option>
      <option>Casados</option>
      <option>União estável</option>
      <option>Namorados</option>
      <option>Solteiro</option>
      <option>Divorciado</option>
      <option>Viúvo</option>
    </select>

    <input id="tempo_juntos" placeholder="Tempo juntos">
    <input id="cidade" placeholder="Cidade">
    <input id="filhos" placeholder="Filhos / idade / nomes">

    <select id="casa_propria">
      <option value="">Casa própria?</option>
      <option>Sim</option>
      <option>Não</option>
    </select>

    <select id="cartao_credito">
      <option value="">Cartão de crédito?</option>
      <option>Sim</option>
      <option>Não</option>
    </select>

    <select id="cheque">
      <option value="">Cheque?</option>
      <option>Sim</option>
      <option>Não</option>
    </select>

    <input id="renda_casal" placeholder="Renda mensal do casal">
    <input id="contato" placeholder="Contato">
    <input id="investimento_lazer" placeholder="Investimento em lazer">
    <input id="sonho_viagem" placeholder="Sonho de viagem">
    <input id="brinde" placeholder="Brinde entregue">

    <select id="status">
      <option value="">Status</option>
      <option>Q</option>
      <option>NQ</option>
    </select>

    <textarea id="observacoes" placeholder="Observações"></textarea>

    <button onclick="salvarPesquisa()">Salvar Pesquisa</button>
    <p id="formMsg"></p>
  </div>
</div>

<script>
const SUPABASE_URL = "https://veznreiamwstlulkpocz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlem5yZWlhbXdzdGx1bGtwb2N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2ODc1NDksImV4cCI6MjA5NzI2MzU0OX0.MeSqJZTZnk3zDKWgD920ccV2KUheH0W_BGD3TvhPXdM";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let usuarioEmail = "";
let captadorNome = "";
let latitude = null;
let longitude = null;

async function entrar() {
  const email = document.getElementById("email").value.trim().toLowerCase();
  const nome = document.getElementById("captadorNome").value.trim();

  if (!email || !nome) {
    msg("loginMsg", "Preencha e-mail e nome.", "erro");
    return;
  }

  usuarioEmail = email;
  captadorNome = nome;

  let { data } = await db
    .from("approved_users")
    .select("*")
    .eq("email", email)
    .maybeSingle();

  if (!data) {
    await db.from("approved_users").insert({ email, name:nome, approved:false });
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("aguardandoBox").classList.remove("hidden");
    return;
  }

  if (data.approved !== true) {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("aguardandoBox").classList.remove("hidden");
    return;
  }

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("formBox").classList.remove("hidden");
  pegarLocalizacao();
}

function pegarLocalizacao() {
  if (!navigator.geolocation) return;

  navigator.geolocation.getCurrentPosition(
    pos => {
      latitude = pos.coords.latitude;
      longitude = pos.coords.longitude;
    },
    () => alert("Permita a localização para salvar o ponto da abordagem.")
  );
}

async function salvarPesquisa() {
  const pesquisa = {
    user_email: usuarioEmail,
    captador_nome: captadorNome,
    convidado_1: campo("convidado_1"),
    idade_1: numero("idade_1"),
    profissao_1: campo("profissao_1"),
    convidado_2: campo("convidado_2"),
    idade_2: numero("idade_2"),
    profissao_2: campo("profissao_2"),
    veiculo: campo("veiculo"),
    ano_veiculo: campo("ano_veiculo"),
    outro_veiculo: campo("outro_veiculo"),
    estado_civil: campo("estado_civil"),
    tempo_juntos: campo("tempo_juntos"),
    cidade: campo("cidade"),
    filhos: campo("filhos"),
    casa_propria: campo("casa_propria"),
    cartao_credito: campo("cartao_credito"),
    cheque: campo("cheque"),
    renda_casal: campo("renda_casal"),
    contato: campo("contato"),
    investimento_lazer: campo("investimento_lazer"),
    sonho_viagem: campo("sonho_viagem"),
    brinde: campo("brinde"),
    status: campo("status"),
    observacoes: campo("observacoes"),
    latitude,
    longitude
  };

  const { error } = await db.from("pesquisas").insert(pesquisa);

  if (error) {
    console.log(error);
    msg("formMsg", "Erro ao salvar. Veja se rodou o SQL.", "erro");
    return;
  }

  msg("formMsg", "Pesquisa salva com sucesso!", "ok");
  document.querySelectorAll("#formBox input,#formBox textarea,#formBox select").forEach(e => e.value = "");
  pegarLocalizacao();
}

function campo(id){ return document.getElementById(id).value; }
function numero(id){ return document.getElementById(id).value ? parseInt(document.getElementById(id).value) : null; }
function msg(id,text,classe){ document.getElementById(id).innerHTML = `<span class="${classe}">${text}</span>`; }
</script>
</body>
</html>
