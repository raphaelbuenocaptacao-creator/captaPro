function posRank(n){const r=rowNome(n); if(!r)return '-'; return rankOrdenado('casais').findIndex(x=>norm(x.nome)===norm(r.nome))+1}
function pontoPorNome(nome){return PONTOS_FIXOS.find(p=>norm(p.nome)===norm(nome))||PONTOS_FIXOS[0]}
function sxScore(r){return (r.casais||0)*300+(r.vendas||0)*1000+Math.floor((r.vgv||0)/10000)}
function nivelSX(score){return score>=7000?'Elite':score>=4000?'Pro':score>=1800?'Avançado':'Iniciante'}

// ===== FICHA FUNCTIONS =====
function statusFicha(x){return String(x?.qualificacao_automatica||x?.status||'').trim()||'N/I'}
function isSala(x){const s=norm(x?.levou_sala||x?.sala_status||x?.status_sala||x?.sala); return s.includes('sim')||s.includes('confirm')||x?.sala===true}
function mesmaData(x){const d=new Date(x?.created_at||x?.data||Date.now()); return d.toDateString()===new Date().toDateString()}

// ===== DADOS LOCAIS =====
async function getDados(tabela){
 let arr=[];
 try{
   if(tabela==='pesquisas') arr=parseLocal('pesquisasLocal',[]);
   else if(tabela==='abordagens') arr=parseLocal('abordagensLocal',[]);
   else arr=parseLocal(tabela+'Local',[]);
 }catch(e){arr=[]}
 if(tabela==='pesquisas'){
   const salas=parseLocal('salasLocal21',[]);
   arr=arr.map(x=>{
     const achou=salas.some(s=>String(s.created_at)===String(x.created_at)&&String(s.user_email)===String(x.user_email));
     return achou?{...x,levou_sala:'Sim',sala_status:'Sim'}:x;
   });
 }
 return arr;
}

function card(t,v,c=''){return `<div class="capta60Card ${c}"><span>${esc(t)}</span><b>${esc(v)}</b></div>`}
function tabelaRank(rows,compact=false){
 if(!rows.length) return '<div class="capta60Empty">Sem dados para exibir.</div>';
 return `<div class="scroll"><table class="capta60Table"><thead><tr><th>Pos.</th><th>Profissional</th><th>Casais</th><th>Vendas</th><th>VGV</th><th>Eficiência</th>${compact?'':'<th>Ponto</th>'}</tr></thead><tbody>${rows.map((r,i)=>`<tr><td class="gold">${i+1}º</td><td><b>${esc(r.nome)}</b></td><td class="green">${r.casais}</td><td class="green">${r.vendas}</td><td>${moeda(r.vgv)}</td><td class="blue">${pct(r.vendas,r.casais)}</td>${compact?'':`<td>${esc(r.ponto||'-')}</td>`}</tr>`).join('')}</tbody></table></div>`}
function fichaResumo(x){const nome=[x.convidado_1,x.convidado_2].filter(Boolean).join(' e ')||'Ficha sem nome'; const sala=isSala(x); return `<div class="capta60Ficha ${sala?'sala':''}"><b>${esc(nome)}</b><small>Profissional: ${esc(x.captador_nome||'-')} • ${new Date(x.created_at||Date.now()).toLocaleString('pt-BR')}</small><small>${esc(x.cidade_origem||'-')} • ${esc(statusFicha(x))} • Sala: ${sala?'Sim':'Não'}</small></div>`}

let mapInstance=null;
window.carregarMapa=function(){
 const box=E('mapaCEO60');
 if(!box)return;
 if(!window.L){box.innerHTML='<div class="capta60Empty">Mapa indisponível. Verifique a internet.</div>';return;}
 if(mapInstance){try{mapInstance.remove()}catch(e){} mapInstance=null;}
 mapInstance=L.map('mapaCEO60',{zoomControl:true}).setView([-22.7395,-45.5917],16);
 L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(mapInstance);
 const bounds=[];
 PONTOS_FIXOS.forEach(p=>{
   const icon=L.divIcon({className:'',html:`<div class="markerPonto60">📍 ${esc(p.nome)}</div>`,iconSize:[165,32],iconAnchor:[8,16]});
   L.marker([p.lat,p.lng],{icon}).addTo(mapInstance).bindPopup(`<b>${esc(p.nome)}</b>`);
   bounds.push([p.lat,p.lng]);
 });
 RANKING_FIXO.forEach((r,i)=>{
   const p=pontoPorNome(r.ponto);
   const lat=p.lat+((i%5)-2)*0.00013;
   const lng=p.lng+(Math.floor(i/5)-1.5)*0.00013;
   const icon=L.divIcon({className:'',html:'<div class="markerProf60"></div>',iconSize:[22,22],iconAnchor:[11,11]});
   L.marker([lat,lng],{icon}).addTo(mapInstance).bindPopup(`<b>${esc(r.nome)}</b><br>📍 ${esc(r.ponto)}<br>Casais: ${r.casais}<br>Vendas: ${r.vendas}<br>VGV: ${moeda(r.vgv)}`);
   bounds.push([lat,lng]);
 });
 if(bounds.length)mapInstance.fitBounds(bounds,{padding:[30,30],maxZoom:17});
 setTimeout(()=>{if(mapInstance)mapInstance.invalidateSize(true);},300);
};

async function entrar(){
 const email=V('email').toLowerCase();
 const nome=V('nome')||email;
 if(!email){H('loginMsg','<span class=erro>Informe o e-mail.</span>');return;}
 try{
   const r=await db.from('approved_users').select('*').eq('email',email).maybeSingle();
   const u=r.data;
   if(!u&&CEOS.includes(email)){role='ceo';usuarioNome=nome||email;}
   else if(!u||u.approved===false){H('loginMsg','<span class=erro>E-mail não aprovado.</span>');return;}
   else {role=u.role||'profissional';usuarioNome=u.name||nome;}
 }catch(e){role=CEOS.includes(email)?'ceo':'profissional';usuarioNome=nome;}
 usuarioEmail=email;
 document.body.classList.toggle('ceo',role==='ceo'||CEOS.includes(email));
 E('loginBox').classList.add('hidden');
 E('app').classList.remove('hidden');
 saveLocal('loginSimples',{email, nome:usuarioNome});
 carregarAbordagensHoje();
}

async function confirmarSala21(){
 if(!ultimaFicha){H('formMsg','<span class=warn>Salve a ficha primeiro.</span>');return;}
 ultimaFicha.levou_sala='Sim';
 ultimaFicha.sala_status='Confirmada';
 const arr=parseLocal('pesquisasLocal',[]);
 const idx=arr.findIndex(x=>String(x.created_at)===String(ultimaFicha.created_at)&&String(x.user_email)===String(ultimaFicha.user_email));
 if(idx>=0)arr[idx]={...arr[idx],levou_sala:'Sim',sala_status:'Confirmada'};
 else arr.push({...ultimaFicha});
 saveLocal('pesquisasLocal',arr);
 const salas=parseLocal('salasLocal21',[]);
 salas.push({...ultimaFicha});
 saveLocal('salasLocal21',salas);
 H('formMsg','<span class=ok>Casal confirmado em sala!</span>');
 renderFicha(ultimaFicha);
}

async function registrarAbordagem(){
 const p={user_email:usuarioEmail,captador_nome:usuarioNome,equipe:V('equipe'),ponto_captacao:V('ponto'),observacao:'Abordagem',created_at:new Date().toISOString()};
 const arr=parseLocal('abordagensLocal',[]);
 arr.push(p);
 saveLocal('abordagensLocal',arr);
 carregarAbordagensHoje();
 H('formMsg','<span class=ok>Abordagem registrada.</span>');
}

// ===== INICIALIZAÇÃO =====
(function init(){
 try{
   const saved=parseLocal('loginSimples',{});
   if(saved.email){
     E('email').value=saved.email;
     E('nome').value=saved.nome||'';
     setTimeout(entrar,300);
   }
   // Carrega a aba ativa
   const activeTab=document.querySelector('.tabs .active');
   if(activeTab){
     const id=activeTab.getAttribute('onclick')?.match(/aba\('([^']+)'/)?.[1];
     if(id) setTimeout(()=>aba(id,activeTab),500);
   }
 }catch(e){console.warn('Init error:',e);}
})();
</script>
